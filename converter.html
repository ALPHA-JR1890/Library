<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drive Link Converter</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  font-family: system-ui, sans-serif;
  background: #f5f0e8;
  color: #1a1612;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card{
  background: #fff;
  border: 1px solid rgba(0,0,0,.1);
  border-radius: 14px;
  padding: 24px;
  width: 100%;
  max-width: 520px;
}
h2{
  font-size: 1rem;
  font-weight: 500;
  margin-bottom: 20px;
  color: #1a1612;
}
.label{
  font-size: 12px;
  color: #7f7568;
  margin-bottom: 5px;
}
.field{ margin-bottom: 14px; }
input[type=text], input[type=number]{
  width: 100%;
  padding: 8px 10px;
  border: 1px solid rgba(0,0,0,.15);
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  color: #1a1612;
  background: #fffcf7;
  outline: none;
}
input:focus{ border-color: #b5401a; }
input::placeholder{ color: #aaa; }
.row{ display: flex; gap: 10px; }
.row .field{ flex: 1; }
.row .field.narrow{ flex: 0 0 100px; }
.error{
  font-size: 12px;
  color: #b5401a;
  min-height: 16px;
  margin-bottom: 10px;
}
.output-label{
  font-size: 12px;
  color: #7f7568;
  margin-bottom: 5px;
}
.output-box{
  background: #f5f0e8;
  border: 1px solid rgba(0,0,0,.1);
  border-radius: 8px;
  padding: 12px;
  font-family: monospace;
  font-size: 13px;
  white-space: pre;
  overflow-x: auto;
  min-height: 110px;
  color: #1a1612;
  line-height: 1.6;
}
.copy-row{
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
}
.copied{
  font-size: 12px;
  color: #2e7d32;
  opacity: 0;
  transition: opacity .3s;
}
.copied.show{ opacity: 1; }
button{
  padding: 8px 16px;
  border: 1px solid rgba(0,0,0,.15);
  border-radius: 8px;
  background: #b5401a;
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
}
button:disabled{
  background: #ddd;
  color: #999;
  border-color: #ddd;
  cursor: default;
}
</style>
</head>
<body>

<div class="card">
  <h2>Google Drive → pdf-list.json converter</h2>

  <div class="field">
    <div class="label">Google Drive share link</div>
    <input type="text" id="url-input" placeholder="https://drive.google.com/file/d/…/view" />
  </div>

  <div class="row">
    <div class="field">
      <div class="label">Title</div>
      <input type="text" id="title-input" placeholder="My Book" />
    </div>
    <div class="field narrow">
      <div class="label">Cover page</div>
      <input type="number" id="cover-input" value="1" min="1" />
    </div>
  </div>

  <div class="error" id="error-msg"></div>

  <div class="output-label">JSON entry</div>
  <div class="output-box" id="output">Paste a link above to generate the entry.</div>

  <div class="copy-row">
    <span class="copied" id="copied-badge">Copied!</span>
    <button id="copy-btn" disabled>Copy</button>
  </div>
</div>

<script>
const urlInput    = document.getElementById('url-input');
const titleInput  = document.getElementById('title-input');
const coverInput  = document.getElementById('cover-input');
const output      = document.getElementById('output');
const errorMsg    = document.getElementById('error-msg');
const copyBtn     = document.getElementById('copy-btn');
const copiedBadge = document.getElementById('copied-badge');

function parseDriveId(url){
  const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m1) return m1[1];
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if(m2) return m2[1];
  return null;
}

function update(){
  const raw   = urlInput.value.trim();
  const title = titleInput.value.trim() || 'My Book';
  const cover = Math.max(1, parseInt(coverInput.value) || 1);

  if(!raw){
    output.textContent = 'Paste a link above to generate the entry.';
    errorMsg.textContent = '';
    copyBtn.disabled = true;
    return;
  }

  const id = parseDriveId(raw);
  if(!id){
    output.textContent = 'Paste a link above to generate the entry.';
    errorMsg.textContent = 'Could not find a file ID in that link.';
    copyBtn.disabled = true;
    return;
  }

  errorMsg.textContent = '';
  const entry = {
    path:  'https://drive.google.com/uc?export=download&id=' + id,
    title: title,
    cover: cover
  };
  output.textContent = JSON.stringify(entry, null, 2);
  copyBtn.disabled = false;
}

urlInput.addEventListener('input', update);
titleInput.addEventListener('input', update);
coverInput.addEventListener('input', update);

copyBtn.addEventListener('click', ()=>{
  navigator.clipboard.writeText(output.textContent).then(()=>{
    copiedBadge.classList.add('show');
    setTimeout(()=>copiedBadge.classList.remove('show'), 1800);
  });
});
</script>
</body>
</html>
