<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Kindle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>

<style>
:root{
  --bg:#f5f0e8;
  --text:#1a1612;
  --muted:#7f7568;
  --accent:#b5401a;
  --blue:#3b82f6;
  --blue-bg:#dbeafe;
  --shadow:rgba(0,0,0,.16);
  --ease:cubic-bezier(.16,1,.3,1);
  --font:'Happy Monkey', cursive;
}

*{ margin:0; padding:0; box-sizing:border-box; }

html,body{
  width:100%; height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  user-select:none;
}

/* ===== LIBRARY ===== */

#library{
  width:100%; height:100%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

#library-title{
  position:absolute;
  top:28px; left:0; right:0;
  text-align:center;
  font-size:1.15rem;
  z-index:20;
  padding:0 80px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  pointer-events:none;
}

/* ===== SETTINGS BUTTON ===== */

#settings-btn{
  position:absolute;
  top:18px; right:20px;
  z-index:30;
  background:none;
  border:none;
  color:var(--muted);
  font-size:1.3rem;
  cursor:pointer;
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  border-radius:8px;
  transition:background .2s, color .2s;
}
#settings-btn:hover{ background:rgba(0,0,0,.07); color:var(--text); }

/* ===== SETTINGS PANEL ===== */

#settings-panel{
  position:absolute;
  top:58px; right:16px;
  z-index:40;
  background:#fffcf7;
  border:1px solid rgba(0,0,0,.1);
  border-radius:14px;
  padding:16px;
  width:230px;
  box-shadow:0 8px 28px rgba(0,0,0,.13);
  display:none;
  flex-direction:column;
  gap:16px;
}
#settings-panel.open{ display:flex; }

.settings-section-label{
  font-size:.72rem;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-bottom:6px;
}

.settings-row{
  display:flex;
  gap:8px;
}

.seg-btn{
  flex:1;
  padding:7px 4px;
  border:1px solid rgba(0,0,0,.12);
  border-radius:8px;
  background:transparent;
  color:var(--muted);
  font-family:var(--font);
  font-size:.78rem;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  transition:background .18s, color .18s, border-color .18s;
}
.seg-btn i{ font-size:1.1rem; }
.seg-btn.active{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

.sort-btn{
  flex:1;
  padding:7px 6px;
  border:1px solid rgba(0,0,0,.12);
  border-radius:8px;
  background:transparent;
  color:var(--muted);
  font-family:var(--font);
  font-size:.78rem;
  cursor:pointer;
  text-align:center;
  transition:background .18s, color .18s, border-color .18s;
}
.sort-btn.active{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

/* ===== CAROUSEL VIEW ===== */

.carousel{
  width:100%; height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  cursor:grab;
}
.carousel.grabbing{ cursor:grabbing; }

.track{
  display:flex;
  align-items:center;
  gap:28px;
  padding:0 100px;
  transition:transform .55s var(--ease);
  will-change:transform;
}

/* ===== GRID VIEW ===== */

#grid-view{
  display:none;
  width:100%; height:100%;
  overflow-y:auto;
  padding:80px 24px 32px;
}
#grid-view.active{ display:block; }

.grid-inner{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:20px 16px;
}

@media(max-width:700px){
  .grid-inner{ grid-template-columns:repeat(3,1fr); }
}

.grid-book{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.grid-cover{
  width:100%;
  aspect-ratio:7/10;
  position:relative;
  border-radius:3px 6px 6px 3px;
  overflow:hidden;
  background:#ddd;
  box-shadow:-3px 0 0 var(--accent), 0 6px 18px var(--shadow);
  transition:transform .2s var(--ease), box-shadow .2s ease;
}
.grid-cover:hover{
  transform:translateY(-4px) scale(1.03);
  box-shadow:-3px 0 0 var(--accent), 0 12px 26px var(--shadow);
}
.grid-cover canvas{ width:100%; height:100%; object-fit:cover; display:block; }
.grid-cover::after{
  content:'';
  position:absolute; top:3px; bottom:3px; right:-2px;
  width:4px;
  border-radius:0 2px 2px 0;
  background:repeating-linear-gradient(to bottom,#fff 0px,#fff 2px,#ececec 2px,#ececec 4px);
}

.grid-title{
  font-size:.68rem;
  color:var(--muted);
  text-align:center;
  line-height:1.3;
  max-width:100%;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

.grid-progress{
  width:90%;
  height:3px;
  border-radius:999px;
  overflow:hidden;
  background:var(--blue-bg);
}
.grid-progress-fill{
  height:100%;
  background:var(--blue);
  transition:width .35s ease;
}

/* ===== BOOK (carousel) ===== */

.book{
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  opacity:.4;
  transform:scale(.82);
  transition:transform .5s var(--ease), opacity .45s ease;
  cursor:pointer;
}
.book.active{ opacity:1; transform:scale(1); }

.cover{
  width:140px; height:200px;
  position:relative;
  border-radius:3px 8px 8px 3px;
  overflow:hidden;
  background:#ddd;
  box-shadow:-5px 0 0 var(--accent), 0 12px 28px var(--shadow);
  transition:width .45s var(--ease), height .45s var(--ease), transform .45s var(--ease);
}
.book.active .cover{ width:190px; height:270px; }

.cover::after{
  content:'';
  position:absolute; top:4px; bottom:4px; right:-3px;
  width:5px;
  border-radius:0 3px 3px 0;
  background:repeating-linear-gradient(to bottom,#fff 0px,#fff 2px,#ececec 2px,#ececec 4px);
}
.cover canvas{ width:100%; height:100%; object-fit:cover; display:block; }

.shimmer{
  position:absolute; inset:0;
  background:linear-gradient(90deg,#ddd 20%,#eee 50%,#ddd 80%);
  background-size:200% 100%;
  animation:shimmer 1.3s linear infinite;
}
@keyframes shimmer{ to{ background-position:-200% 0; } }

.progress{
  width:100%; height:4px;
  border-radius:999px; overflow:hidden;
  background:var(--blue-bg);
  opacity:0;
  transition:opacity .3s ease;
}
.book.active .progress{ opacity:1; }
.progress-fill{ width:0%; height:100%; background:var(--blue); transition:width .35s ease; }

/* ===== READER ===== */

#reader{
  position:fixed; inset:0;
  background:var(--bg);
  display:none; flex-direction:column;
  opacity:0; transform:scale(1.03);
  transition:opacity .45s ease, transform .45s var(--ease);
  z-index:100;
}
#reader.active{ display:flex; }
#reader.show{ opacity:1; transform:scale(1); }

.reader-top{
  position:absolute; top:0; left:0; right:0;
  z-index:20; padding:18px 24px;
  display:flex; flex-direction:column; gap:12px;
  pointer-events:none;
}
.reader-row{ display:flex; align-items:center; justify-content:space-between; }
.reader-title{ color:var(--muted); font-size:.9rem; max-width:70%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.page-info{ color:var(--muted); font-size:.8rem; }
.reader-progress{ width:100%; height:4px; border-radius:999px; overflow:hidden; background:rgba(0,0,0,.08); }
.reader-progress-fill{ width:0%; height:100%; background:var(--blue); transition:width .35s ease; }

.page-wrap{
  flex:1; display:flex; align-items:center; justify-content:center;
  overflow:hidden; animation:fadeIn .45s ease;
}
#pdf-canvas{ display:block; max-width:100%; max-height:100%; }

@keyframes fadeIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }

.nav{ position:fixed; top:0; bottom:0; width:40%; z-index:10; }
#nav-left{ left:0; }
#nav-right{ right:0; }

#back-btn{
  position:absolute; top:16px; left:20px; z-index:30;
  background:none; border:none; color:var(--muted);
  font-family:inherit; font-size:.85rem; cursor:pointer;
}

@media(max-width:700px){
  .track{ padding:0 60px; gap:18px; }
  .cover{ width:115px; height:170px; }
  .book.active .cover{ width:155px; height:225px; }
}
</style>
</head>
<body>

<div id="library">

  <div id="library-title">Loading...</div>

  <button id="settings-btn" title="Settings" aria-label="Settings">
    <i class="ti ti-settings" aria-hidden="true"></i>
  </button>

  <div id="settings-panel">

    <div>
      <div class="settings-section-label">Display</div>
      <div class="settings-row">
        <button class="seg-btn active" id="view-carousel" aria-label="Carousel view">
          <i class="ti ti-carousel-horizontal" aria-hidden="true"></i>
          Carousel
        </button>
        <button class="seg-btn" id="view-grid" aria-label="Grid view">
          <i class="ti ti-layout-grid" aria-hidden="true"></i>
          Grid
        </button>
      </div>
    </div>

    <div>
      <div class="settings-section-label">Sort by</div>
      <div class="settings-row">
        <button class="sort-btn active" id="sort-title">Title</button>
        <button class="sort-btn" id="sort-progress">Progress</button>
        <button class="sort-btn" id="sort-recent">Recent</button>
      </div>
    </div>

  </div>

  <div class="carousel" id="carousel">
    <div class="track" id="track"></div>
  </div>

  <div id="grid-view">
    <div class="grid-inner" id="grid-inner"></div>
  </div>

</div>

<div id="reader">
  <button id="back-btn">← Library</button>
  <div class="reader-top">
    <div class="reader-row">
      <div class="reader-title" id="reader-title">Book</div>
      <div class="page-info" id="page-info">1 / 1</div>
    </div>
    <div class="reader-progress">
      <div class="reader-progress-fill" id="reader-progress-fill"></div>
    </div>
  </div>
  <div id="nav-left" class="nav"></div>
  <div id="nav-right" class="nav"></div>
  <div class="page-wrap">
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>

<script type="module">

async function getPdfjsLib(){
  for(let i=0;i<60;i++){
    if(window.pdfjsLib) return window.pdfjsLib;
    await new Promise(r=>setTimeout(r,50));
  }
  throw new Error('PDF.js failed to load');
}

/* ===== DOM ===== */
const track = document.getElementById('track');
const carousel = document.getElementById('carousel');
const libraryTitle = document.getElementById('library-title');
const reader = document.getElementById('reader');
const canvas = document.getElementById('pdf-canvas');
const pageInfo = document.getElementById('page-info');
const readerTitle = document.getElementById('reader-title');
const readerProgressFill = document.getElementById('reader-progress-fill');
const backBtn = document.getElementById('back-btn');
const navLeft = document.getElementById('nav-left');
const navRight = document.getElementById('nav-right');
const settingsBtn = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');
const gridView = document.getElementById('grid-view');
const gridInner = document.getElementById('grid-inner');

/* ===== STATE ===== */
let books = [];
let focused = 0;
let currentDoc = null;
let currentPage = 1;
let currentBook = null;
let viewMode = 'carousel'; // 'carousel' | 'grid'
let sortMode = 'title';    // 'title' | 'progress' | 'recent'

/* ===== SETTINGS PANEL TOGGLE ===== */
settingsBtn.addEventListener('click', e=>{
  e.stopPropagation();
  settingsPanel.classList.toggle('open');
});
document.addEventListener('click', e=>{
  if(!settingsPanel.contains(e.target) && e.target !== settingsBtn){
    settingsPanel.classList.remove('open');
  }
});

/* ===== VIEW TOGGLE ===== */
document.getElementById('view-carousel').addEventListener('click', ()=>{
  viewMode = 'carousel';
  document.getElementById('view-carousel').classList.add('active');
  document.getElementById('view-grid').classList.remove('active');
  carousel.style.display = '';
  gridView.classList.remove('active');
  updateCarousel();
});

document.getElementById('view-grid').addEventListener('click', ()=>{
  viewMode = 'grid';
  document.getElementById('view-grid').classList.add('active');
  document.getElementById('view-carousel').classList.remove('active');
  carousel.style.display = 'none';
  gridView.classList.add('active');
  libraryTitle.textContent = 'My Library';
  renderGrid();
});

/* ===== SORT ===== */
['sort-title','sort-progress','sort-recent'].forEach(id=>{
  document.getElementById(id).addEventListener('click', ()=>{
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    sortMode = id.replace('sort-','');
    sortBooks();
    if(viewMode === 'carousel'){
      rebuildCarousel();
      updateCarousel();
    } else {
      renderGrid();
    }
  });
});

function getSortedIndices(){
  const indices = books.map((_,i)=>i);
  if(sortMode === 'title'){
    indices.sort((a,b)=>books[a].title.localeCompare(books[b].title));
  } else if(sortMode === 'progress'){
    indices.sort((a,b)=>{
      const pa = getProgress(books[a].path);
      const pb = getProgress(books[b].path);
      return pb - pa;
    });
  } else if(sortMode === 'recent'){
    indices.sort((a,b)=>{
      const ra = Number(localStorage.getItem('recent::'+books[a].path)) || 0;
      const rb = Number(localStorage.getItem('recent::'+books[b].path)) || 0;
      return rb - ra;
    });
  }
  return indices;
}

function getProgress(path){
  const page = Number(localStorage.getItem('page::'+path)) || 1;
  const total = Number(localStorage.getItem('total::'+path)) || 1;
  if(total <= 1) return 0;
  return (page - 1) / (total - 1);
}

function sortBooks(){ /* order is applied via getSortedIndices, books array unchanged */ }

/* ===== LOAD LIBRARY ===== */
async function loadLibrary(){
  let raw = [];
  try{
    const res = await fetch('./pdf-list.json?t=' + Date.now());
    raw = await res.json();
  }catch(err){
    libraryTitle.textContent = 'Could not load pdf-list.json';
    return;
  }

  books = raw.map(item=>{
    if(typeof item === 'string') return{ path:item, title:cleanName(item) };
    return{ path:item.path, title:item.title || cleanName(item.path) };
  });

  const pdfjsLib = await getPdfjsLib();
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  // Build carousel items
  for(let i=0;i<books.length;i++){
    const el = document.createElement('div');
    el.className = 'book';
    el.dataset.index = i;
    el.innerHTML = `
      <div class="cover" id="cover-${i}"><div class="shimmer"></div></div>
      <div class="progress"><div class="progress-fill" id="fill-${i}"></div></div>
    `;
    track.appendChild(el);
    renderThumbnail(pdfjsLib, i);
  }

  updateCarousel();

  track.addEventListener('click', e=>{
    const book = e.target.closest('.book');
    if(!book) return;
    const i = Number(book.dataset.index);
    if(i === focused){ openBook(i); }
    else{ focused = i; updateCarousel(); }
  });

  setupDragging();
}

/* ===== REBUILD CAROUSEL (after sort) ===== */
function rebuildCarousel(){
  const sorted = getSortedIndices();
  track.innerHTML = '';
  sorted.forEach(i=>{
    const el = document.createElement('div');
    el.className = 'book';
    el.dataset.index = i;
    const cover = document.getElementById('cover-'+i);
    const fill = document.getElementById('fill-'+i);
    // clone existing cover
    const coverClone = cover ? cover.cloneNode(true) : document.createElement('div');
    coverClone.id = 'cover-'+i;
    el.appendChild(coverClone);
    const prog = document.createElement('div');
    prog.className = 'progress';
    const progFill = document.createElement('div');
    progFill.className = 'progress-fill';
    progFill.id = 'fill-'+i;
    if(fill) progFill.style.width = fill.style.width;
    prog.appendChild(progFill);
    el.appendChild(prog);
    track.appendChild(el);
  });
  focused = 0;
}

/* ===== RENDER GRID ===== */
function renderGrid(){
  gridInner.innerHTML = '';
  const sorted = getSortedIndices();
  sorted.forEach(i=>{
    const book = books[i];
    const el = document.createElement('div');
    el.className = 'grid-book';
    el.dataset.index = i;

    const coverEl = document.createElement('div');
    coverEl.className = 'grid-cover';
    coverEl.id = 'grid-cover-'+i;

    // reuse rendered thumbnail canvas if available
    const existingCover = document.getElementById('cover-'+i);
    if(existingCover){
      const c = existingCover.querySelector('canvas');
      if(c){
        const clone = c.cloneNode(true);
        coverEl.appendChild(clone);
      } else {
        coverEl.innerHTML = '<div class="shimmer"></div>';
      }
    } else {
      coverEl.innerHTML = '<div class="shimmer"></div>';
    }

    const percent = getProgress(book.path) * 100;
    const titleEl = document.createElement('div');
    titleEl.className = 'grid-title';
    titleEl.textContent = book.title;

    const prog = document.createElement('div');
    prog.className = 'grid-progress';
    prog.innerHTML = `<div class="grid-progress-fill" style="width:${percent}%"></div>`;

    el.appendChild(coverEl);
    el.appendChild(titleEl);
    el.appendChild(prog);

    el.addEventListener('click', ()=>openBook(i));
    gridInner.appendChild(el);
  });
}

/* ===== UPDATE CAROUSEL ===== */
function updateCarousel(){
  const all = [...document.querySelectorAll('.book')];
  all.forEach((book,i)=>book.classList.toggle('active', i === focused));

  const bookIndex = all[focused] ? Number(all[focused].dataset.index) : 0;
  if(books[bookIndex]) libraryTitle.textContent = books[bookIndex].title;

  const active = all[focused];
  if(active){
    const offset = active.offsetLeft - (window.innerWidth/2) + (active.clientWidth/2);
    track.style.transform = `translateX(${-offset}px)`;
  }
}

/* ===== DRAGGING ===== */
function setupDragging(){
  let startX=0, startFocus=0, dragging=false;
  const STEP=180;
  function begin(x){ startX=x; startFocus=focused; dragging=true; carousel.classList.add('grabbing'); }
  function move(x){
    if(!dragging) return;
    const dx=x-startX;
    const steps=-Math.round(dx/STEP);
    const next=Math.max(0,Math.min(books.length-1,startFocus+steps));
    if(next!==focused){ focused=next; updateCarousel(); }
  }
  function end(){ dragging=false; carousel.classList.remove('grabbing'); }
  carousel.addEventListener('mousedown',e=>begin(e.clientX));
  window.addEventListener('mousemove',e=>move(e.clientX));
  window.addEventListener('mouseup',end);
  carousel.addEventListener('touchstart',e=>begin(e.touches[0].clientX),{passive:true});
  carousel.addEventListener('touchmove',e=>move(e.touches[0].clientX),{passive:true});
  carousel.addEventListener('touchend',end);
}

/* ===== THUMBNAILS ===== */
async function renderThumbnail(pdfjsLib,i){
  const book=books[i];
  try{
    const doc = await pdfjsLib.getDocument('./'+book.path).promise;
    localStorage.setItem('total::'+book.path, doc.numPages);
    const savedPage = Number(localStorage.getItem('page::'+book.path))||1;
    const percent = ((savedPage-1)/(doc.numPages-1))*100;
    const fill = document.getElementById('fill-'+i);
    if(fill) fill.style.width=percent+'%';
    const page = await doc.getPage(1);
    const vp = page.getViewport({scale:0.42});
    const c = document.createElement('canvas');
    c.width=vp.width; c.height=vp.height;
    await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
    const cover = document.getElementById('cover-'+i);
    if(cover){ cover.innerHTML=''; cover.appendChild(c); }
  }catch(err){ console.error(err); }
}

/* ===== OPEN BOOK ===== */
async function openBook(i){
  const book=books[i];
  if(!book) return;
  const pdfjsLib=await getPdfjsLib();
  pdfjsLib.GlobalWorkerOptions.workerSrc=
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
  currentBook=book;
  currentDoc=await pdfjsLib.getDocument('./'+book.path).promise;
  localStorage.setItem('recent::'+book.path, Date.now());
  currentPage=Number(localStorage.getItem('page::'+book.path))||1;
  currentPage=Math.max(1,Math.min(currentPage,currentDoc.numPages));
  readerTitle.textContent=book.title;
  reader.classList.add('active');
  requestAnimationFrame(()=>{ reader.classList.add('show'); renderPage(currentPage); });
}

/* ===== RENDER PAGE ===== */
async function renderPage(num){
  const page=await currentDoc.getPage(num);
  const base=page.getViewport({scale:1});
  const scale=Math.min(window.innerWidth/base.width,window.innerHeight/base.height);
  const vp=page.getViewport({scale});
  canvas.width=vp.width; canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  currentPage=num;
  localStorage.setItem('page::'+currentBook.path,num);
  pageInfo.textContent=`${num} / ${currentDoc.numPages}`;
  const percent=((num-1)/(currentDoc.numPages-1))*100;
  readerProgressFill.style.width=percent+'%';
  const idx=books.findIndex(b=>b.path===currentBook.path);
  const fill=document.getElementById('fill-'+idx);
  if(fill) fill.style.width=percent+'%';
}

/* ===== NAVIGATION ===== */
navLeft.addEventListener('click',()=>{ if(currentPage>1) renderPage(currentPage-1); });
navRight.addEventListener('click',()=>{ if(currentDoc&&currentPage<currentDoc.numPages) renderPage(currentPage+1); });

/* ===== CLOSE READER ===== */
backBtn.addEventListener('click',()=>{
  reader.classList.remove('show');
  setTimeout(()=>reader.classList.remove('active'),300);
});

/* ===== KEYBOARD ===== */
window.addEventListener('keydown',e=>{
  if(reader.classList.contains('active')){
    if(e.key==='ArrowRight') navRight.click();
    if(e.key==='ArrowLeft') navLeft.click();
    if(e.key==='Escape') backBtn.click();
  } else {
    if(viewMode==='carousel'){
      if(e.key==='ArrowRight'){ focused=Math.min(books.length-1,focused+1); updateCarousel(); }
      if(e.key==='ArrowLeft'){ focused=Math.max(0,focused-1); updateCarousel(); }
      if(e.key==='Enter') openBook(focused);
    }
  }
});

/* ===== HELPERS ===== */
function cleanName(path){
  return path.split('/').pop().replace('.pdf','').replace(/[_-]/g,' ');
}

loadLibrary();
