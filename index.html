<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Kindle</title>

<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'Happy Monkey', cursive;
  background:#f5f0e8;
}

/* LIBRARY */
#library{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

#title{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:18px;
}

.track{
  display:flex;
  gap:25px;
  padding:0 80px;
}

.book{
  cursor:pointer;
  opacity:0.5;
  transform:scale(0.85);
  transition:0.3s;
}

.book.active{
  opacity:1;
  transform:scale(1);
}

.cover{
  width:150px;
  height:220px;
  background:#ddd;
  overflow:hidden;
}

/* READER */
#reader{
  position:fixed;
  inset:0;
  display:none;
  background:#f5f0e8;
}

#reader.active{
  display:block;
}

#canvas{
  display:block;
  margin:auto;
  max-width:100%;
  max-height:100%;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  bottom:0;
  width:40%;
}

#left{left:0;}
#right{right:0;}

</style>
</head>

<body>

<div id="library">
  <div id="title"></div>
  <div class="track" id="track"></div>
</div>

<div id="reader">
  <div id="left" class="nav"></div>
  <div id="right" class="nav"></div>
  <canvas id="canvas"></canvas>
</div>

<script type="module">

async function getPdfjs(){
  for(let i=0;i<60;i++){
    if(window.pdfjsLib) return window.pdfjsLib;
    await new Promise(r=>setTimeout(r,50));
  }
}

function getPdfUrl(path){
  return path.startsWith('http')
    ? path
    : './' + path;
}

const track=document.getElementById('track');
const title=document.getElementById('title');
const reader=document.getElementById('reader');
const canvas=document.getElementById('canvas');

const left=document.getElementById('left');
const right=document.getElementById('right');

let books=[];
let currentDoc;
let page=1;
let currentBook;
let focused=0;

async function load(){

  const res=await fetch('./pdf-list.json');
  books=await res.json();

  const pdfjs=await getPdfjs();

  pdfjs.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  books.forEach((b,i)=>{

    const el=document.createElement('div');
    el.className='book';
    el.dataset.i=i;

    el.innerHTML=`
      <div class="cover"></div>
    `;

    track.appendChild(el);
  });

  track.onclick=(e)=>{

    const b=e.target.closest('.book');
    if(!b) return;

    const i=+b.dataset.i;

    if(i===focused) open(i);
    else{
      focused=i;
      update();
    }
  };

  update();
}

function update(){

  [...document.querySelectorAll('.book')]
  .forEach((b,i)=>{
    b.classList.toggle('active',i===focused);
  });

  title.textContent=books[focused]?.title||'';
}

async function open(i){

  const pdfjs=await getPdfjs();

  currentBook=books[i];

  currentDoc=await pdfjs.getDocument({
    url:getPdfUrl(currentBook.path),
    rangeChunkSize:65536
  }).promise;

  page=Number(localStorage.getItem(currentBook.path))||1;

  reader.classList.add('active');

  render(page);
}

async function render(n){

  const pageObj=await currentDoc.getPage(n);

  const vp=pageObj.getViewport({scale:1.5});

  canvas.width=vp.width;
  canvas.height=vp.height;

  await pageObj.render({
    canvasContext:canvas.getContext('2d'),
    viewport:vp
  }).promise;

  page=n;

  localStorage.setItem(currentBook.path,page);
}

/* NAV */

left.onclick=()=>page>1&&render(page-1);
right.onclick=()=>page<currentDoc.numPages&&render(page+1);

load();

</script>

</body>
</html>
