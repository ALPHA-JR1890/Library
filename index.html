<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Kindle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
  <style>
    :root {
      --bg: #f5f0e8;
      --ink: #1a1612;
      --ink-faint: #9a8e7e;
      --accent: #b5401a;
      --blue: #3b82f6;
      --blue-track: #dbeafe;
      --shadow: rgba(60,40,10,0.15);
      --ease: cubic-bezier(0.16,1,0.3,1);
      --font: 'Happy Monkey', cursive;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── LIBRARY ── */
    #library {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* centered title shown only for focused book */
    #center-title {
      position: absolute;
      top: 32px;
      left: 0; right: 0;
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      color: var(--ink);
      pointer-events: none;
      z-index: 20;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      padding: 0 80px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #center-title.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── CAROUSEL ── */
    .carousel {
      position: relative;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      cursor: grab;
      user-select: none;
    }
    .carousel.grabbing { cursor: grabbing; }

    .carr-track-wrap {
      width: 100%; height: 100%;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .carr-track {
      display: flex;
      align-items: center;
      gap: 28px;
      will-change: transform;
      padding: 20px 80px;
      pointer-events: none;
    }

    /* ── BOOK SLOT ── */
    .book-slot {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: transform 0.45s var(--ease), opacity 0.45s ease;
      pointer-events: none;
    }

    .slot-thumb {
      position: relative;
      border-radius: 2px 5px 5px 2px;
      overflow: hidden;
      box-shadow: -4px 0 0 0 var(--accent), 4px 8px 22px var(--shadow);
      flex-shrink: 0;
      /* size set by JS */
    }
    .slot-thumb::after {
      content: ''; position: absolute; right: -3px; top: 4px; bottom: 4px; width: 5px;
      background: repeating-linear-gradient(to bottom,#f5f0e8 0,#f5f0e8 2px,#ede7d6 2px,#ede7d6 3px);
      border-radius: 0 2px 2px 0; z-index: 2;
    }
    /* gradient that blends cover into page bg */
    .slot-thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 55%, var(--bg) 100%);
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .book-slot.focused .slot-thumb::before { opacity: 1; }

    .slot-thumb canvas {
      display: block;
      width: 100%; height: 100%;
    }
    .thumb-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(100deg,#ede7d6 30%,#f5f0e8 50%,#ede7d6 70%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      z-index: 1;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* progress bar — only visible on focused */
    .slot-bar {
      width: 100%;
      height: 3px;
      background: var(--blue-track);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .book-slot.focused .slot-bar { opacity: 1; }
    .slot-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ── INVISIBLE NAV ZONES (reader only) ── */
    #reader-nav-left, #reader-nav-right {
      position: fixed;
      top: 0; bottom: 0;
      width: 40%;
      z-index: 300;
      cursor: pointer;
      display: none;
    }
    #reader-nav-left  { left: 0; }
    #reader-nav-right { right: 0; }

    /* ── READER ── */
    #reader {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      z-index: 200;
    }
    /* no toolbar — just the page fills the screen */
    .reader-page-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #pdf-canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
    /* top bar with back + page number, subtle */
    .reader-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 22px;
      z-index: 10;
      pointer-events: none;
    }
    .reader-bar-back {
      pointer-events: all;
      color: var(--ink-faint);
      font-size: 0.8rem;
      display: flex; align-items: center; gap: 6px;
      opacity: 0.7;
      transition: opacity .2s;
    }
    .reader-bar-back:hover { opacity: 1; }
    .reader-bar-back svg { width: 16px; height: 16px; }
    .reader-bar-pages {
      font-size: 0.72rem;
      color: var(--ink-faint);
      opacity: 0.6;
      letter-spacing: 0.08em;
    }
    .r-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      opacity: 0; pointer-events: none; transition: opacity .2s;
      z-index: 5;
    }
    .r-loading.on { opacity: 1; pointer-events: all; }
    .spinner {
      width: 26px; height: 26px;
      border: 2px solid #ddd; border-top-color: var(--blue);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- LIBRARY -->
<div id="library">
  <div id="center-title"></div>
  <div class="carousel" id="carousel">
    <div class="carr-track-wrap">
      <div class="carr-track" id="carr-track"></div>
    </div>
  </div>
</div>

<!-- INVISIBLE NAV ZONES (active in reader) -->
<div id="reader-nav-left"></div>
<div id="reader-nav-right"></div>

<!-- READER -->
<div id="reader">
  <div class="reader-page-wrap">
    <canvas id="pdf-canvas"></canvas>
    <div class="r-loading" id="r-loading"><span class="spinner"></span></div>
    <div class="reader-bar">
      <button class="reader-bar-back" id="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        library
      </button>
      <span class="reader-bar-pages" id="page-num"></span>
    </div>
  </div>
</div>

<script type="module">
  // ── PDF.js ─────────────────────────────────────────────────────────────
  async function getPdfjsLib() {
    for (let i = 0; i < 60; i++) {
      if (window.pdfjsLib) return window.pdfjsLib;
      await new Promise(r => setTimeout(r, 50));
    }
    throw new Error('PDF.js failed to load.');
  }

  // ── State ──────────────────────────────────────────────────────────────
  let books       = [];
  let focusIdx    = 0;
  let currentDoc  = null;
  let currentPage = 1;
  let currentPath = '';
  let rendering   = false;

  // card sizes
  const CARD_W_FOCUS  = 190;
  const CARD_H_FOCUS  = 268;
  const CARD_W_SIDE   = 140;
  const CARD_H_SIDE   = 198;
  const GAP = 28;

  // ── DOM ────────────────────────────────────────────────────────────────
  const library     = document.getElementById('library');
  const reader      = document.getElementById('reader');
  const track       = document.getElementById('carr-track');
  const carousel    = document.getElementById('carousel');
  const centerTitle = document.getElementById('center-title');
  const backBtn     = document.getElementById('back-btn');
  const pageNum     = document.getElementById('page-num');
  const pdfCanvas   = document.getElementById('pdf-canvas');
  const rLoading    = document.getElementById('r-loading');
  const navLeft     = document.getElementById('reader-nav-left');
  const navRight    = document.getElementById('reader-nav-right');

  // ── Load library ────────────────────────────────────────────────────────
  async function loadLibrary() {
    let raw = [];
    try {
      const res = await fetch('./pdf-list.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      raw = await res.json();
      if (!Array.isArray(raw)) throw new Error('Not an array');
    } catch (e) {
      library.innerHTML = '<p style="font-family:var(--font);color:var(--ink-faint);padding:40px;text-align:center">Could not load pdf-list.json — ' + e.message + '</p>';
      return;
    }

    books = raw.map(item =>
      typeof item === 'string'
        ? { path: item,      title: cleanName(item),      coverPage: 1 }
        : { path: item.path, title: item.title || cleanName(item.path), coverPage: item.coverPage || 1 }
    );

    const pdfjsLib = await getPdfjsLib();
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    books.forEach((book, i) => {
      const slot = document.createElement('div');
      slot.className = 'book-slot';
      slot.dataset.index = i;

      const thumb = document.createElement('div');
      thumb.className = 'slot-thumb';
      thumb.id = 'thumb-' + i;
      thumb.innerHTML = '<div class="thumb-shimmer" id="shimmer-' + i + '"></div>';
      thumb.style.width  = CARD_W_SIDE + 'px';
      thumb.style.height = CARD_H_SIDE + 'px';

      const bar  = document.createElement('div');
      bar.className = 'slot-bar';
      const fill = document.createElement('div');
      fill.className = 'slot-fill';
      fill.id = 'fill-' + i;
      fill.style.width = '0%';
      bar.appendChild(fill);
      bar.style.width = CARD_W_SIDE + 'px';

      slot.appendChild(thumb);
      slot.appendChild(bar);
      track.appendChild(slot);
    });

    updateCarousel(false);
    setupDrag();

    // tap to focus, double-tap / click-on-focused to open
    let lastClick = { idx: -1, time: 0 };
    track.addEventListener('click', e => {
      const slot = e.target.closest('.book-slot');
      if (!slot) return;
      const i = parseInt(slot.dataset.index);
      const now = Date.now();
      if (i === focusIdx) {
        openBook(i);
      } else {
        focusIdx = i;
        updateCarousel(true);
      }
      lastClick = { idx: i, time: now };
    });

    // Render thumbnails
    for (let i = 0; i < books.length; i++) {
      await renderThumbnail(pdfjsLib, i);
    }
  }

  // ── Carousel ─────────────────────────────────────────────────────────
  function updateCarousel(animate) {
    const slots = Array.from(track.querySelectorAll('.book-slot'));
    if (!slots.length) return;

    const wrapW = carousel.clientWidth;

    // compute offset so focused card is centred
    let offsetX = wrapW / 2;
    // sum widths of cards before focusIdx
    for (let i = 0; i < focusIdx; i++) {
      offsetX -= (i === focusIdx - 1 ? CARD_W_SIDE : CARD_W_SIDE) + GAP;
    }
    // account for padding-left (80px) and half focused card
    offsetX = (wrapW / 2) - (80); // we'll compute properly below

    // Build positions
    let x = 80; // padding-left
    const positions = [];
    for (let i = 0; i < slots.length; i++) {
      const w = i === focusIdx ? CARD_W_FOCUS : CARD_W_SIDE;
      positions.push(x);
      x += w + GAP;
    }
    const focusCentreX = positions[focusIdx] + CARD_W_FOCUS / 2;
    const shift = wrapW / 2 - focusCentreX;

    track.style.transition = animate ? 'transform 0.5s cubic-bezier(0.16,1,0.3,1)' : 'none';
    track.style.transform  = 'translateX(' + shift + 'px)';

    slots.forEach((slot, i) => {
      const thumb = slot.querySelector('.slot-thumb');
      const bar   = slot.querySelector('.slot-bar');
      const isFocus = i === focusIdx;
      const dist    = Math.abs(i - focusIdx);

      slot.classList.toggle('focused', isFocus);

      const w = isFocus ? CARD_W_FOCUS : CARD_W_SIDE;
      const h = isFocus ? CARD_H_FOCUS : CARD_H_SIDE;
      thumb.style.width  = w + 'px';
      thumb.style.height = h + 'px';
      if (bar) bar.style.width = w + 'px';

      const opacity = dist === 0 ? 1 : Math.max(0.35, 1 - dist * 0.2);
      slot.style.opacity    = opacity;
      slot.style.transition = animate ? 'opacity 0.45s ease' : 'none';
    });

    // show title for focused book
    if (books[focusIdx]) {
      centerTitle.textContent = books[focusIdx].title;
      centerTitle.classList.add('visible');
    }
  }

  // ── Drag / hold-scroll ────────────────────────────────────────────────
  function setupDrag() {
    let startX = 0, startFocus = 0, dragging = false, moved = false;
    const SLOT_W = CARD_W_SIDE + GAP;

    function onStart(x) {
      startX     = x;
      startFocus = focusIdx;
      dragging   = true;
      moved      = false;
      carousel.classList.add('grabbing');
    }
    function onMove(x) {
      if (!dragging) return;
      const dx    = x - startX;
      if (Math.abs(dx) > 6) moved = true;
      const steps = -Math.round(dx / SLOT_W);
      const newIdx = Math.max(0, Math.min(books.length - 1, startFocus + steps));
      if (newIdx !== focusIdx) { focusIdx = newIdx; updateCarousel(true); }
    }
    function onEnd() {
      dragging = false;
      carousel.classList.remove('grabbing');
    }

    // Mouse
    carousel.addEventListener('mousedown',  e => onStart(e.clientX));
    window.addEventListener('mousemove',    e => { if (dragging) onMove(e.clientX); });
    window.addEventListener('mouseup',      () => onEnd());

    // Touch
    carousel.addEventListener('touchstart', e => onStart(e.touches[0].clientX), { passive: true });
    carousel.addEventListener('touchmove',  e => onMove(e.touches[0].clientX),  { passive: true });
    carousel.addEventListener('touchend',   () => onEnd());

    // Keyboard
    window.addEventListener('keydown', e => {
      if (reader.style.display !== 'none') return;
      if (e.key === 'ArrowLeft'  && focusIdx > 0)               { focusIdx--; updateCarousel(true); }
      if (e.key === 'ArrowRight' && focusIdx < books.length - 1) { focusIdx++; updateCarousel(true); }
      if (e.key === 'Enter') openBook(focusIdx);
    });
  }

  // ── Thumbnail ──────────────────────────────────────────────────────────
  async function renderThumbnail(pdfjsLib, i) {
    const book    = books[i];
    const thumbEl = document.getElementById('thumb-' + i);
    const shimmer = document.getElementById('shimmer-' + i);
    if (!thumbEl) return;
    try {
      const doc   = await pdfjsLib.getDocument('./' + book.path).promise;
      book.totalPages = doc.numPages;
      const pageN = Math.max(1, Math.min(book.coverPage, doc.numPages));
      const pg    = await doc.getPage(pageN);
      const base  = pg.getViewport({ scale: 1 });
      const scale = (CARD_W_FOCUS * window.devicePixelRatio) / base.width;
      const vp    = pg.getViewport({ scale });
      const c     = document.createElement('canvas');
      c.width  = vp.width;
      c.height = vp.height;
      c.style.width  = '100%';
      c.style.height = '100%';
      c.style.objectFit = 'cover';
      await pg.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
      thumbEl.appendChild(c);

      const saved = parseInt(localStorage.getItem('page::' + book.path)) || 1;
      const pct   = doc.numPages > 1 ? Math.round(((saved - 1) / (doc.numPages - 1)) * 100) : 100;
      const fill  = document.getElementById('fill-' + i);
      if (fill) fill.style.width = pct + '%';

      doc.destroy();
    } catch (e) {
      console.warn('Thumb failed:', book.path, e);
    } finally {
      shimmer && shimmer.remove();
    }
  }

  // ── Reader ────────────────────────────────────────────────────────────
  async function openBook(i) {
    const book = books[i];
    if (!book) return;
    setRLoading(true);

    // set reader bg to match page bg
    reader.style.background = getComputedStyle(document.documentElement).getPropertyValue('--bg');

    library.style.display = 'none';
    reader.style.display  = 'flex';
    navLeft.style.display = navRight.style.display = 'block';

    const pdfjsLib = await getPdfjsLib();
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    try {
      currentPath = book.path;
      currentDoc  = await pdfjsLib.getDocument('./' + book.path).promise;
      currentPage = parseInt(localStorage.getItem('page::' + book.path)) || 1;
      currentPage = Math.max(1, Math.min(currentPage, currentDoc.numPages));
    } catch (err) {
      alert('Could not open "' + book.title + '".\n' + err.message);
      closeReader(); return;
    }
    await renderReaderPage(currentPage);
  }

  async function renderReaderPage(num) {
    if (rendering) return;
    rendering = true; setRLoading(true);
    try {
      const pg   = await currentDoc.getPage(num);
      const base = pg.getViewport({ scale: 1 });

      // detect dominant bg color from first pixels to blend reader bg
      const tempC   = document.createElement('canvas');
      tempC.width   = 4; tempC.height = 4;
      const tempCtx = tempC.getContext('2d');
      const smallVP = pg.getViewport({ scale: 4 / base.width });
      await pg.render({ canvasContext: tempCtx, viewport: smallVP }).promise;
      const px  = tempCtx.getImageData(0, 0, 1, 1).data;
      const bgC = 'rgb(' + px[0] + ',' + px[1] + ',' + px[2] + ')';
      reader.style.background = bgC;
      document.body.style.background = bgC;

      // real render
      const maxW = window.innerWidth;
      const maxH = window.innerHeight;
      const sc   = Math.min(maxW / base.width, maxH / base.height, 2);
      const vp   = pg.getViewport({ scale: sc });
      pdfCanvas.width  = vp.width;
      pdfCanvas.height = vp.height;
      await pg.render({ canvasContext: pdfCanvas.getContext('2d'), viewport: vp }).promise;

      currentPage = num;
      localStorage.setItem('page::' + currentPath, num);

      // update progress bar
      const idx  = books.findIndex(b => b.path === currentPath);
      const fill = document.getElementById('fill-' + idx);
      if (fill && currentDoc.numPages > 1) {
        fill.style.width = Math.round(((num-1)/(currentDoc.numPages-1))*100) + '%';
      }
      updateReaderUI();
    } catch (e) { console.error(e); }
    finally { rendering = false; setRLoading(false); }
  }

  function updateReaderUI() {
    const total = currentDoc ? currentDoc.numPages : 0;
    pageNum.textContent = currentPage + ' / ' + total;
  }

  function closeReader() {
    reader.style.display  = 'none';
    navLeft.style.display = navRight.style.display = 'none';
    library.style.display = 'flex';
    document.body.style.background = '';
    currentDoc = null; currentPath = ''; currentPage = 1;
    pageNum.textContent = '';
  }

  function setRLoading(on) { rLoading.classList.toggle('on', on); }

  // nav zones
  navLeft.addEventListener('click',  () => { if (currentPage > 1) renderReaderPage(currentPage - 1); });
  navRight.addEventListener('click', () => { if (currentDoc && currentPage < currentDoc.numPages) renderReaderPage(currentPage + 1); });
  backBtn.addEventListener('click',  closeReader);

  window.addEventListener('keydown', e => {
    if (reader.style.display === 'none') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navRight.click();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navLeft.click();
    if (e.key === 'Escape') closeReader();
  });

  function cleanName(p) {
    return p.split('/').pop().replace(/\.pdf$/i,'').replace(/[_-]+/g,' ');
  }
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  requestAnimationFrame(() => requestAnimationFrame(loadLibrary));
</script>
</body>
</html>
