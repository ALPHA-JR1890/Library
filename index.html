<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Kindle</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module" id="pdfjs-script"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── LIBRARY VIEW ── -->
  <div id="library-view">

    <header class="site-header">
      <div class="header-inner">
        <span class="header-eyebrow">personal library</span>
        <h1 class="header-title">My Kindle</h1>
      </div>
      <div class="header-line"></div>
    </header>

    <main class="shelf-wrapper">
      <div class="shelf" id="shelf">
        <!-- book cards injected by JS -->
      </div>
      <p class="empty-msg" id="empty-msg" hidden>No PDFs found in this repository.</p>
    </main>

    <footer class="site-footer">
      <span id="book-count">— books</span>
    </footer>

  </div>

  <!-- ── READER VIEW ── -->
  <div id="reader-view" hidden>

    <div class="reader-toolbar">
      <button class="toolbar-btn" id="back-btn" title="Back to library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <span class="toolbar-title" id="reader-title"></span>
      <span class="toolbar-pages" id="page-indicator">— / —</span>
    </div>

    <div class="reader-body">
      <button class="page-btn page-prev" id="prev-btn" title="Previous page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>

      <div class="canvas-wrap">
        <canvas id="pdf-canvas"></canvas>
        <div class="page-loading" id="page-loading">
          <span class="spinner"></span>
        </div>
      </div>

      <button class="page-btn page-next" id="next-btn" title="Next page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
