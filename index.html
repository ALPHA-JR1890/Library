<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Kindle</title>

<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>

<style>
:root{
  --bg:#f5f0e8;
  --muted:#7f7568;
  --blue:#3b82f6;
  --blue-bg:#dbeafe;
  --font:'Happy Monkey', cursive;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:var(--font);
  background:var(--bg);
  overflow:hidden;
}

/* LIBRARY */
#library{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

#title{
  position:absolute;
  top:18px;
  width:100%;
  text-align:center;
  color:var(--muted);
}

.track{
  display:flex;
  gap:20px;
  padding:0 120px;
  transition:transform .4s ease;
}

.book{
  opacity:.4;
  transform:scale(.85);
  transition:.3s;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  pointer-events:auto;
}

.book.active{
  opacity:1;
  transform:scale(1);
}

/* IMPORTANT FIX */
.cover{
  width:140px;
  height:200px;
  background:#ddd;
  border-radius:6px;
  overflow:hidden;
  pointer-events:none;
}

.cover canvas{
  width:100%;
  height:100%;
  pointer-events:none;
}

/* progress */
.progress{
  width:140px;
  height:5px;
  background:var(--blue-bg);
  border-radius:999px;
  overflow:hidden;
  margin-top:6px;
}

.fill{
  height:100%;
  width:0%;
  background:var(--blue);
  transition:width .3s ease;
}

/* READER */
#reader{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  background:var(--bg);
}

#reader.active{
  display:flex;
}

.top{
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  color:var(--muted);
}

#canvas{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

canvas{
  max-width:100%;
  max-height:100%;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  bottom:0;
  width:40%;
}

#left{left:0;}
#right{right:0;}
</style>
</head>

<body>

<div id="library">
  <div id="title">My Library</div>
  <div class="track" id="track"></div>
</div>

<div id="reader">

  <div class="top">
    <div id="bookTitle">Book</div>
    <div id="pageInfo">1 / 1</div>
  </div>

  <div id="canvas">
    <canvas id="pdf"></canvas>
  </div>

  <div class="nav" id="left"></div>
  <div class="nav" id="right"></div>

</div>

<script type="module">

let books=[];
let pdfDoc=null;
let page=1;
let currentBook=null;

const track=document.getElementById("track");
const reader=document.getElementById("reader");
const canvas=document.getElementById("pdf");
const pageInfo=document.getElementById("pageInfo");
const bookTitle=document.getElementById("bookTitle");

/* PDF LIB */
async function lib(){
  while(!window.pdfjsLib){
    await new Promise(r=>setTimeout(r,50));
  }
  return window.pdfjsLib;
}

/* LOAD BOOKS */
async function load(){

  const pdfjsLib=await lib();

  const res=await fetch("./pdf-list.json");
  books=await res.json();

  books.forEach((b,i)=>{

    const el=document.createElement("div");
    el.className="book";

    el.innerHTML=`
      <div class="cover"></div>
      <div class="progress"><div class="fill"></div></div>
    `;

    el.onclick=()=>open(i);

    track.appendChild(el);

    renderThumb(b,i,pdfjsLib);
  });
}

/* THUMBNAILS */
async function renderThumb(book,i,pdfjsLib){

  const doc=await pdfjsLib.getDocument(book.path).promise;

  const page=await doc.getPage(1);
  const vp=page.getViewport({scale:0.4});

  const c=document.createElement("canvas");
  c.width=vp.width;
  c.height=vp.height;

  await page.render({
    canvasContext:c.getContext("2d"),
    viewport:vp
  }).promise;

  track.children[i].querySelector(".cover").appendChild(c);

  const saved=Number(localStorage.getItem(book.path))||1;

  const percent=((saved-1)/(doc.numPages-1))*100;

  track.children[i].querySelector(".fill").style.width=percent+"%";
}

/* OPEN BOOK */
async function open(i){

  const pdfjsLib=await lib();

  currentBook=books[i];

  pdfDoc=await pdfjsLib.getDocument(currentBook.path).promise;

  page=Number(localStorage.getItem(currentBook.path))||1;

  reader.classList.add("active");

  bookTitle.textContent=currentBook.title||"Book";

  render();
}

/* RENDER PAGE */
async function render(){

  const p=await pdfDoc.getPage(page);

  const vp=p.getViewport({scale:1.5});

  canvas.width=vp.width;
  canvas.height=vp.height;

  await p.render({
    canvasContext:canvas.getContext("2d"),
    viewport:vp
  }).promise;

  pageInfo.textContent=`${page} / ${pdfDoc.numPages}`;

  localStorage.setItem(currentBook.path,page);

  updateProgress();
}

/* PROGRESS */
function updateProgress(){

  const idx=books.findIndex(b=>b.path===currentBook.path);

  const percent=((page-1)/(pdfDoc.numPages-1))*100;

  const fill=track.children[idx].querySelector(".fill");

  fill.style.width=percent+"%";
}

/* NAV */
document.getElementById("left").onclick=()=>{
  if(page>1){page--;render();}
};

document.getElementById("right").onclick=()=>{
  if(page<pdfDoc.numPages){page++;render();}
};

load();

</script>

</body>
</html>
