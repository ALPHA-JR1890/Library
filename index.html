<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Kindle</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --paper: #fefefe; --ink: #222; --border: #ddd; }
        body { font-family: 'Happy Monkey', cursive; background: var(--paper); color: var(--ink); margin: 0; overflow: hidden; }
        .top-nav { width: 100%; text-align: center; padding: 20px 0; border-bottom: 1px solid var(--border); background: var(--paper); }
        .top-nav h1 { margin: 0; font-size: 1.5rem; font-weight: normal; letter-spacing: 2px; }
        .shelf-container { height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; }
        .wheel { display: flex; overflow-x: auto; gap: 35px; padding: 40px; width: 90vw; scroll-snap-type: x mandatory; }
        .book-card { flex: 0 0 160px; height: 240px; background: white; border-radius: 2px; scroll-snap-align: center; cursor: pointer; border: 1px solid var(--border); border-left: 10px solid #444; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .title-text { padding: 15px; text-align: center; font-size: 0.9rem; }
        #reader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--paper); display: none; z-index: 100; }
        .reader-header { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); z-index: 10; background: var(--paper); }
        .nav-zone { position: absolute; top: 0; height: 100%; width: 25%; z-index: 5; cursor: pointer; }
        .nav-left { left: 0; } .nav-right { right: 0; }
        canvas { display: block; margin: 60px auto 0; max-height: calc(100vh - 60px); max-width: 100vw; }
        .close-btn { color: #aaa; font-size: 30px; cursor: pointer; padding: 0 20px; }
    </style>
</head>
<body>

<div class="top-nav"><h1>My Kindle</h1></div>
<div class="shelf-container" id="library-view"><div class="wheel" id="shelf"></div></div>

<div id="reader">
    <div class="reader-header">
        <span style="padding-left:20px" id="reader-title"></span>
        <span class="close-btn" onclick="closeReader()">&times;</span>
    </div>
    <div class="nav-zone nav-left" onclick="prevPage()"></div>
    <div class="nav-zone nav-right" onclick="nextPage()"></div>
    <canvas id="pdf-canvas"></canvas>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';
    let currentDoc = null, currPage = 1, currentPath = "";

    // This part fixes the URL issue automatically
    const repoName = window.location.pathname.split('/')[1];
    const jsonPath = window.location.hostname.includes('github.io') ? `/${repoName}/pdf-list.json` : 'pdf-list.json';

    fetch(jsonPath + '?t=' + Date.now())
        .then(res => {
            if (!res.ok) throw new Error('Could not find the book list');
            return res.json();
        })
        .then(pdfs => {
            const shelf = document.getElementById('shelf');
            if (!pdfs || pdfs.length === 0) {
                shelf.innerHTML = "<h2>The list is empty. Add PDFs to your folder!</h2>";
                return;
            }
            pdfs.forEach(path => {
                const cleanName = path.split('/').pop().replace('.pdf', '').replace(/_/g, ' ');
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `<div class="title-text">${cleanName}</div>`;
                card.onclick = () => openBook(path, cleanName);
                shelf.appendChild(card);
            });
        })
        .catch(err => {
            document.getElementById('shelf').innerHTML = "<h2>Error: Books not found. Refreshing might help!</h2>";
            console.error(err);
        });

    async function openBook(path, title) {
        currentPath = path;
        document.getElementById('reader-title').innerText = title;
        document.getElementById('library-view').style.display = 'none';
        document.querySelector('.top-nav').style.display = 'none';
        document.getElementById('reader').style.display = 'block';

        const loadingTask = pdfjsLib.getDocument(path);
        currentDoc = await loadingTask.promise;
        currPage = parseInt(localStorage.getItem('page-' + path)) || 1;
        renderPage(currPage);
    }

    async function renderPage(num) {
        const page = await currentDoc.getPage(num);
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const viewport = page.getViewport({ scale: 1.3 });
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        localStorage.setItem('page-' + currentPath, num);
    }

    function nextPage() { if (currPage < currentDoc.numPages) renderPage(++currPage); }
    function prevPage() { if (currPage > 1) renderPage(--currPage); }
    function closeReader() {
        document.getElementById('reader').style.display = 'none';
        document.getElementById('library-view').style.display = 'flex';
        document.querySelector('.top-nav').style.display = 'block';
        currentDoc = null;
    }
</script>
</body>
</html>
