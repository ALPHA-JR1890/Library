<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Kindle</title>

<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Happy Monkey', cursive;
  background:#f5f0e8;
  overflow:hidden;
}

/* LIBRARY */
#library{
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

#title{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:#7f7568;
}

.track{
  display:flex;
  gap:20px;
  padding:0 120px;
  transition:transform .4s ease;
}

.book{
  opacity:.5;
  transform:scale(.85);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.book.active{
  opacity:1;
  transform:scale(1);
}

/* IMPORTANT FIX */
.cover{
  width:140px;
  height:200px;
  background:#ddd;
  border-radius:6px;
  overflow:hidden;
  pointer-events:none;
}

.cover canvas{
  width:100%;
  height:100%;
  pointer-events:none;
}

.progress{
  width:140px;
  height:5px;
  background:#dbeafe;
  border-radius:999px;
  overflow:hidden;
  margin-top:6px;
}

.fill{
  height:100%;
  width:0%;
  background:#3b82f6;
  transition:width .3s ease;
}

/* READER */
#reader{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  background:#f5f0e8;
}

#reader.active{
  display:flex;
}

.top{
  display:flex;
  justify-content:space-between;
  padding:14px;
  color:#7f7568;
}

#canvas{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

canvas{
  max-width:100%;
  max-height:100%;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  bottom:0;
  width:40%;
}

#left{left:0;}
#right{right:0;}
</style>
</head>

<body>

<div id="library">
  <div id="title">My Library</div>
  <div class="track" id="track"></div>
</div>

<div id="reader">

  <div class="top">
    <div id="bookTitle">Book</div>
    <div id="pageInfo">1 / 1</div>
  </div>

  <div id="canvas">
    <canvas id="pdf"></canvas>
  </div>

  <div class="nav" id="left"></div>
  <div class="nav" id="right"></div>

</div>

<!-- ✅ STABLE PDF.JS (NO MODULE BUGS) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js";

let books=[];
let pdfDoc=null;
let page=1;
let currentBook=null;

const track=document.getElementById("track");
const reader=document.getElementById("reader");
const canvas=document.getElementById("pdf");
const pageInfo=document.getElementById("pageInfo");
const bookTitle=document.getElementById("bookTitle");

/* LOAD BOOKS */
async function load(){

  const res=await fetch("./pdf-list.json");
  books=await res.json();

  books.forEach((b,i)=>{

    const el=document.createElement("div");
    el.className="book";

    el.innerHTML=`
      <div class="cover"></div>
      <div class="progress"><div class="fill"></div></div>
    `;

    el.addEventListener("click",()=>open(i));

    track.appendChild(el);

    renderThumb(b,i);
  });
}

/* THUMBNAIL */
async function renderThumb(book,i){

  const doc=await pdfjsLib.getDocument(book.path).promise;

  const p=await doc.getPage(1);
  const vp=p.getViewport({scale:0.4});

  const c=document.createElement("canvas");
  c.width=vp.width;
  c.height=vp.height;

  await p.render({
    canvasContext:c.getContext("2d"),
    viewport:vp
  }).promise;

  track.children[i].querySelector(".cover").appendChild(c);

  const saved=Number(localStorage.getItem(book.path))||1;

  const percent=((saved-1)/(doc.numPages-1))*100;

  track.children[i].querySelector(".fill").style.width=percent+"%";
}

/* OPEN BOOK */
async function open(i){

  currentBook=books[i];

  pdfDoc=await pdfjsLib.getDocument(currentBook.path).promise;

  if(!pdfDoc){
    alert("Failed to load PDF");
    return;
  }

  page=Number(localStorage.getItem(currentBook.path))||1;

  reader.classList.add("active");

  bookTitle.textContent=currentBook.title||"Book";

  render();
}

/* ✅ FIXED RENDER (NO BLANK PAGE BUG) */
async function render(){

  const pageObj=await pdfDoc.getPage(page);

  const viewport1=pageObj.getViewport({scale:1});

  const scale=Math.min(
    window.innerWidth/viewport1.width,
    window.innerHeight/viewport1.height
  );

  const viewport=pageObj.getViewport({scale});

  const ctx=canvas.getContext("2d");

  canvas.width=viewport.width;
  canvas.height=viewport.height;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  await pageObj.render({
    canvasContext:ctx,
    viewport:viewport
  }).promise;

  pageInfo.textContent=`${page} / ${pdfDoc.numPages}`;

  localStorage.setItem(currentBook.path,page);

  updateProgress();
}

/* PROGRESS */
function updateProgress(){

  const idx=books.findIndex(b=>b.path===currentBook.path);

  const percent=((page-1)/(pdfDoc.numPages-1))*100;

  track.children[idx]
    .querySelector(".fill")
    .style.width=percent+"%";
}

/* NAV */
document.getElementById("left").onclick=()=>{
  if(page>1){page--;render();}
};

document.getElementById("right").onclick=()=>{
  if(page<pdfDoc.numPages){page++;render();}
};

load();
</script>

</body>
</html>
