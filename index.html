<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Kindle</title>

<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>

<style>
:root{
  --bg:#f5f0e8;
  --text:#1a1612;
  --blue:#3b82f6;
  --blue-bg:#dbeafe;
  --accent:#b5401a;
  --shadow:rgba(0,0,0,.18);
  --font:'Happy Monkey', cursive;
  --ease:cubic-bezier(.16,1,.3,1);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:var(--font);
  color:var(--text);
}

/* ================= LIBRARY ================= */

#library{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

#title{
  position:absolute;
  top:25px;
  left:0;
  right:0;
  text-align:center;
}

.carousel{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:grab;
}

.track{
  display:flex;
  gap:28px;
  padding:0 100px;
  transition:transform .5s var(--ease);
}

.book{
  display:flex;
  flex-direction:column;
  align-items:center;
  opacity:.4;
  transform:scale(.85);
  transition:.4s ease;
  cursor:pointer;
}

.book.active{
  opacity:1;
  transform:scale(1);
}

.cover{
  width:150px;
  height:220px;
  background:#ddd;
  position:relative;
  overflow:hidden;
  border-radius:5px;
  box-shadow:-5px 0 0 var(--accent), 0 10px 25px var(--shadow);
  transition:width .4s, height .4s;
}

.book.active .cover{
  width:200px;
  height:280px;
}

.cover canvas{
  width:100%;
  height:100%;
}

/* ================= READER ================= */

#reader{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  background:var(--bg);
}

#reader.active{
  display:flex;
}

/* TOP BAR */

.topbar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  padding:15px 20px;
  z-index:10;
}

.progress{
  width:100%;
  height:4px;
  background:var(--blue-bg);
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  width:0%;
  height:100%;
  background:var(--blue);
  transition:width .3s ease;
}

/* PAGE AREA */

.page-wrap{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* CANVAS */

#pdf{
  max-width:100%;
  max-height:100%;
  display:block;
}

/* ================= PAGE TURN ANIMATION ================= */

.page-flip-overlay{
  position:absolute;
  inset:0;
  background:var(--bg);
  transform-origin:left;
  transform:rotateY(0deg);
  opacity:0;
  pointer-events:none;
}

/* ACTIVE FLIP */
.page-flip-overlay.active{
  animation:flipPage 1.5s var(--ease);
}

@keyframes flipPage{
  0%{
    transform:rotateY(0deg);
    opacity:0;
  }
  15%{
    opacity:1;
  }
  50%{
    transform:rotateY(-90deg);
    opacity:1;
  }
  100%{
    transform:rotateY(-180deg);
    opacity:0;
  }
}

/* NAV */

.nav{
  position:fixed;
  top:0;
  bottom:0;
  width:40%;
}

#left{left:0;}
#right{right:0;}

</style>
</head>

<body>

<div id="library">
  <div id="title"></div>
  <div class="carousel">
    <div class="track" id="track"></div>
  </div>
</div>

<div id="reader">

  <div class="topbar">
    <div class="progress">
      <div class="progress-fill" id="fill"></div>
    </div>
  </div>

  <div id="left" class="nav"></div>
  <div id="right" class="nav"></div>

  <div class="page-wrap">

    <div class="page-flip-overlay" id="flip"></div>

    <canvas id="pdf"></canvas>

  </div>

</div>

<script type="module">

async function getPdfjs(){
  for(let i=0;i<60;i++){
    if(window.pdfjsLib) return window.pdfjsLib;
    await new Promise(r=>setTimeout(r,50));
  }
}

const track = document.getElementById('track');
const title = document.getElementById('title');

const reader = document.getElementById('reader');
const canvas = document.getElementById('pdf');

const flip = document.getElementById('flip');
const fill = document.getElementById('fill');

const left = document.getElementById('left');
const right = document.getElementById('right');

let books=[];
let currentDoc;
let page=1;
let currentBook;
let focused=0;

async function load(){

  const res = await fetch('./pdf-list.json');
  books = await res.json();

  const pdfjs = await getPdfjs();

  pdfjs.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  books.forEach((b,i)=>{

    const el = document.createElement('div');
    el.className='book';
    el.dataset.i=i;

    el.innerHTML=`
      <div class="cover" id="c${i}"></div>
    `;

    track.appendChild(el);

  });

  track.onclick=(e)=>{

    const b=e.target.closest('.book');
    if(!b) return;

    const i=+b.dataset.i;

    if(i===focused){
      open(i);
    }else{
      focused=i;
      update();
    }
  };

  update();
}

function update(){

  [...document.querySelectorAll('.book')]
  .forEach((b,i)=>{
    b.classList.toggle('active',i===focused);
  });

  title.textContent=books[focused]?.title||'';
}

async function open(i){

  const pdfjs = await getPdfjs();

  currentBook = books[i];

  currentDoc = await pdfjs.getDocument('./'+currentBook.path).promise;

  page = Number(localStorage.getItem(currentBook.path)) || 1;

  reader.classList.add('active');

  render(page);
}

async function render(n){

  triggerFlip(); // 🔥 1.5s animation

  const p = await currentDoc.getPage(n);

  const vp = p.getViewport({scale:1.4});

  canvas.width = vp.width;
  canvas.height = vp.height;

  await p.render({
    canvasContext:canvas.getContext('2d'),
    viewport:vp
  }).promise;

  page=n;

  localStorage.setItem(currentBook.path,page);

  fill.style.width =
  ((page-1)/(currentDoc.numPages-1))*100+'%';
}

/* ================= PAGE TURN ANIMATION ================= */

function triggerFlip(){

  flip.classList.remove('active');
  void flip.offsetWidth; // restart animation
  flip.classList.add('active');
}

left.onclick=()=>{
  if(page>1) render(page-1);
};

right.onclick=()=>{
  if(page<currentDoc.numPages) render(page+1);
};

load();

</script>

</body>
</html>
