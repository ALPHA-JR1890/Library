<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My PDF Library</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; display: flex; flex-wrap: wrap; gap: 25px; padding: 40px; justify-content: center; }
        .book { 
            width: 150px; height: 210px; background: #fff; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
            border-left: 12px solid #34495e; border-radius: 3px 8px 8px 3px; 
            cursor: pointer; display: flex; align-items: center; 
            justify-content: center; text-align: center; padding: 15px; 
            font-weight: 600; color: #2c3e50; transition: transform 0.2s ease;
        }
        .book:hover { transform: translateY(-10px) scale(1.02); background: #fafafa; }
    </style>
</head>
<body>
    <div id="shelf" style="display: contents;"></div>

    <script>
        // Fetch the list created by the GitHub Action
        fetch('pdf-list.json')
            .then(response => response.json())
            .then(pdfs => {
                const shelf = document.getElementById('shelf');
                if (pdfs.length === 0 || (pdfs.length === 1 && pdfs[0] === "[")) {
                    shelf.innerHTML = "<h1>No PDFs found in the 'Pdf' folder yet!</h1>";
                    return;
                }

                pdfs.forEach(path => {
                    // Extract the filename from the path (e.g., "Pdf/book.pdf" -> "book")
                    const fileName = path.split('/').pop().replace('.pdf', '');
                    
                    const book = document.createElement('div');
                    book.className = 'book';
                    book.innerText = fileName;
                    
                    // Click to open the PDF in a new tab
                    book.onclick = () => window.open(path, '_blank');
                    
                    shelf.appendChild(book);
                });
            })
            .catch(err => {
                document.body.innerHTML = "<h1>Loading... (Wait for the Action to finish)</h1>";
            });
    </script>
</body>
</html>
