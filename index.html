<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Kindle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<!-- ✅ FIX: correct PDF.js build -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>

<style>
:root{
  --bg:#f5f0e8;
  --text:#1a1612;
  --muted:#7f7568;
  --accent:#b5401a;
  --blue:#3b82f6;
  --blue-bg:#dbeafe;
  --shadow:rgba(0,0,0,.16);
  --ease:cubic-bezier(.16,1,.3,1);
  --font:'Happy Monkey', cursive;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:var(--font);
}

/* ===== LAYOUT ===== */
#library{width:100%;height:100%;position:relative;}
#library-title{
  position:absolute;top:20px;width:100%;
  text-align:center;color:var(--muted);
}

.carousel{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.track{
  display:flex;gap:24px;
  padding:0 80px;
  transition:transform .5s var(--ease);
}

.book{
  opacity:.4;transform:scale(.85);
  transition:.4s;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
}
.book.active{opacity:1;transform:scale(1);}

.cover{
  width:140px;height:200px;
  background:#ddd;
  overflow:hidden;
  border-radius:6px;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
}
.cover canvas{width:100%;height:100%;object-fit:cover;}

.progress{
  width:100%;height:4px;background:var(--blue-bg);
  margin-top:6px;border-radius:10px;overflow:hidden;
}
.progress-fill{height:100%;background:var(--blue);width:0%;}

#grid-view{
  display:none;
  padding:80px 20px;
  overflow-y:auto;
  height:100%;
}
#grid-view.active{display:block;}

.grid-inner{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

.grid-book{cursor:pointer;text-align:center;}
.grid-cover{height:160px;background:#ddd;border-radius:6px;overflow:hidden;}
.grid-cover canvas{width:100%;height:100%;object-fit:cover;}
</style>
</head>

<body>

<div id="library">

  <div id="library-title">Loading...</div>

  <div class="carousel" id="carousel">
    <div class="track" id="track"></div>
  </div>

  <div id="grid-view">
    <div class="grid-inner" id="grid-inner"></div>
  </div>

</div>

<!-- READER -->
<div id="reader" style="display:none;position:fixed;inset:0;background:#f5f0e8;">
  <canvas id="pdf-canvas"></canvas>
</div>

<script>
/* ================= PDF.JS INIT (FIXED) ================= */
const pdfjsLib = window.pdfjsLib;
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js";

/* ================= STATE ================= */
let books = [];
let focused = 0;
let currentDoc = null;
let currentPage = 1;
let viewMode = "carousel";

const track = document.getElementById("track");
const grid = document.getElementById("grid-inner");
const title = document.getElementById("library-title");

/* cache */
const thumbCache = {};

/* ================= LOAD LIBRARY ================= */
async function loadLibrary(){
  const res = await fetch("./pdf-list.json");
  const raw = await res.json();

  books = raw.map(b => typeof b === "string"
    ? { path:b, title:b.split("/").pop() }
    : b
  );

  renderCarousel();
  renderAllThumbs();
}

function renderCarousel(){
  track.innerHTML = "";

  books.forEach((b,i)=>{
    const el = document.createElement("div");
    el.className = "book";
    el.dataset.index = i;

    el.innerHTML = `
      <div class="cover" id="cover-${i}"></div>
      <div class="progress"><div class="progress-fill" id="fill-${i}"></div></div>
    `;

    el.onclick = ()=>{
      if(focused === i) openBook(i);
      else { focused = i; update(); }
    };

    track.appendChild(el);
  });

  update();
}

function update(){
  const items = [...document.querySelectorAll(".book")];

  items.forEach((b,i)=>b.classList.toggle("active", i===focused));

  const active = items[focused];
  if(active){
    const offset = active.offsetLeft - window.innerWidth/2 + active.clientWidth/2;
    track.style.transform = `translateX(${-offset}px)`;
    title.textContent = books[focused].title;
  }
}

/* ================= THUMBNAILS ================= */
async function renderAllThumbs(){
  for(let i=0;i<books.length;i++){
    renderThumb(i);
  }
}

async function renderThumb(i){
  try{
    const doc = await pdfjsLib.getDocument(books[i].path).promise;

    const page = await doc.getPage(1);
    const vp = page.getViewport({ scale:0.4 });

    const canvas = document.createElement("canvas");
    canvas.width = vp.width;
    canvas.height = vp.height;

    await page.render({
      canvasContext: canvas.getContext("2d"),
      viewport: vp
    }).promise;

    thumbCache[i] = canvas;

    const el = document.getElementById(`cover-${i}`);
    if(el){
      el.innerHTML = "";
      el.appendChild(canvas.cloneNode(true));
    }

  }catch(e){
    console.warn("thumb failed", books[i].title);
  }
}

/* ================= OPEN BOOK ================= */
async function openBook(i){
  const pdf = await pdfjsLib.getDocument(books[i].path).promise;

  currentDoc = pdf;
  currentPage = 1;

  renderPage(1);
}

async function renderPage(num){
  const page = await currentDoc.getPage(num);
  const vp = page.getViewport({ scale:1 });

  const canvas = document.getElementById("pdf-canvas");
  const ctx = canvas.getContext("2d");

  const scale = Math.min(
    window.innerWidth / vp.width,
    window.innerHeight / vp.height
  );

  const scaled = page.getViewport({ scale });

  canvas.width = scaled.width;
  canvas.height = scaled.height;

  await page.render({ canvasContext: ctx, viewport: scaled }).promise;

  currentPage = num;
}

/* ================= GRID (FIXED SIMPLE) ================= */
function renderGrid(){
  grid.innerHTML = "";

  books.forEach((b,i)=>{
    const el = document.createElement("div");
    el.className = "grid-book";

    el.innerHTML = `
      <div class="grid-cover" id="g-${i}"></div>
      <div>${b.title}</div>
    `;

    el.onclick = ()=>openBook(i);

    grid.appendChild(el);

    if(thumbCache[i]){
      document.getElementById(`g-${i}`).appendChild(
        thumbCache[i].cloneNode(true)
      );
    }
  });
}

/* ================= INIT ================= */
loadLibrary();

</script>
</body>
</html>
