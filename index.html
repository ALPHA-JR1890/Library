<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Kindle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">

<script
src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs"
type="module">
</script>

<style>
:root{
  --bg:#f5f0e8;
  --text:#1a1612;
  --muted:#7f7568;
  --accent:#b5401a;
  --blue:#3b82f6;
  --blue-bg:#dbeafe;
  --shadow:rgba(0,0,0,.16);
  --ease:cubic-bezier(.16,1,.3,1);
  --font:'Happy Monkey', cursive;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:var(--font);
}

/* LIBRARY */
#library{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

#library-title{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:var(--muted);
}

.carousel{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.track{display:flex;gap:20px;transition:transform .5s var(--ease);padding:0 100px;}

.book{opacity:.4;transform:scale(.8);transition:.4s;cursor:pointer;display:flex;flex-direction:column;align-items:center;}
.book.active{opacity:1;transform:scale(1);}

.cover{
  width:140px;height:200px;background:#ddd;border-radius:6px;overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.cover canvas{width:100%;height:100%;}

/* READER */
#reader{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  background:var(--bg);
}

#reader.active{display:flex;}

#canvas{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

canvas{max-width:100%;max-height:100%;}

/* NAV */
.nav{
  position:fixed;
  top:0;bottom:0;
  width:40%;
}
#left{left:0;}
#right{right:0;}

/* KONAMI MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#modal-box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:420px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:10px;
}
</style>
</head>

<body>

<!-- LIBRARY -->
<div id="library">
  <div id="library-title">My Library</div>
  <div class="carousel">
    <div class="track" id="track"></div>
  </div>
</div>

<!-- READER -->
<div id="reader">
  <div id="canvas">
    <canvas id="pdf"></canvas>
  </div>
  <div class="nav" id="left"></div>
  <div class="nav" id="right"></div>
</div>

<!-- KONAMI MODAL -->
<div id="modal">
  <div id="modal-box">
    <h3>Add Google Drive PDF</h3>
    <input id="url" placeholder="Paste Drive link here">
    <button id="add">Add</button>
    <button id="close">Cancel</button>
  </div>
</div>

<script type="module">

let books = [];
let current = 0;
let pdfDoc = null;
let pageNum = 1;

/* LOAD PDF.JS */
async function lib(){
  while(!window.pdfjsLib){
    await new Promise(r=>setTimeout(r,50));
  }
  return window.pdfjsLib;
}

/* DEFAULT LOAD */
async function load(){
  const pdfjsLib = await lib();

  const res = await fetch("./pdf-list.json");
  books = await res.json();

  const track = document.getElementById("track");

  books.forEach((b,i)=>{
    const el = document.createElement("div");
    el.className = "book";
    el.innerHTML = `<div class="cover"></div>`;
    el.onclick = ()=>open(i);
    track.appendChild(el);
  });

  renderThumbs(pdfjsLib);
}

/* THUMBS */
async function renderThumbs(pdfjsLib){
  books.forEach(async (b,i)=>{
    const doc = await pdfjsLib.getDocument(b.path).promise;
    const page = await doc.getPage(1);
    const vp = page.getViewport({scale:0.4});

    const c = document.createElement("canvas");
    c.width = vp.width;
    c.height = vp.height;

    await page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise;

    document.querySelectorAll(".cover")[i].appendChild(c);
  });
}

/* OPEN */
async function open(i){
  const pdfjsLib = await lib();

  pdfDoc = await pdfjsLib.getDocument(books[i].path).promise;
  pageNum = 1;

  document.getElementById("reader").classList.add("active");
  render();
}

/* RENDER PAGE */
async function render(){
  const page = await pdfDoc.getPage(pageNum);
  const vp = page.getViewport({scale:1.5});

  const c = document.getElementById("pdf");
  c.width = vp.width;
  c.height = vp.height;

  await page.render({
    canvasContext:c.getContext("2d"),
    viewport:vp
  }).promise;
}

/* NAV */
document.getElementById("left").onclick=()=>{
  if(pageNum>1){pageNum--;render();}
};

document.getElementById("right").onclick=()=>{
  if(pageNum<pdfDoc.numPages){pageNum++;render();}
};

/* KONAMI CODE */
const code=["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight"];
let idx=0;

window.addEventListener("keydown",(e)=>{
  if(e.key===code[idx]){
    idx++;
    if(idx===code.length){
      idx=0;
      openModal();
    }
  }else idx=0;
});

/* MODAL */
const modal=document.getElementById("modal");

function openModal(){
  modal.style.display="flex";
}

document.getElementById("close").onclick=()=>{
  modal.style.display="none";
};

function convertDrive(url){
  const m=url.match(/\/d\/(.*?)\//);
  return m?`https://drive.google.com/uc?export=download&id=${m[1]}`:url;
}

document.getElementById("add").onclick=()=>{
  const url=document.getElementById("url").value;
  books.push({path:convertDrive(url)});
  modal.style.display="none";
  document.getElementById("track").innerHTML="";
  load();
};

/* START */
load();

</script>

</body>
</html>
