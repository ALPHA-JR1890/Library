<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Kindle</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs"
    type="module">
  </script>

  <style>
    :root{
      --bg:#f5f0e8;
      --ink:#1a1612;
      --accent:#b5401a;
      --blue:#3b82f6;
      --blue-track:#dbeafe;
      --shadow:rgba(0,0,0,.15);
      --font:'Happy Monkey', cursive;
      --ease:cubic-bezier(0.16,1,0.3,1);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--ink);
      font-family:var(--font);
    }

    button{
      border:none;
      background:none;
      font-family:inherit;
      cursor:pointer;
    }

    /* =========================
       LIBRARY
    ========================== */

    #library{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }

    #center-title{
      position:absolute;
      top:30px;
      left:0;
      right:0;
      text-align:center;
      font-size:1.2rem;
      z-index:20;
      pointer-events:none;
    }

    .carousel{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      cursor:grab;
      user-select:none;
    }

    .carousel.grabbing{
      cursor:grabbing;
    }

    .track{
      display:flex;
      align-items:center;
      gap:30px;
      padding:0 100px;
      transition:transform .5s var(--ease);
      will-change:transform;

      /* FIX */
      pointer-events:auto;
    }

    /* =========================
       BOOKS
    ========================== */

    .book{
      flex-shrink:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      opacity:.5;
      transform:scale(.85);
      transition:
        transform .45s var(--ease),
        opacity .45s ease;
      
      /* FIX */
      pointer-events:auto;
      cursor:pointer;
    }

    .book.active{
      opacity:1;
      transform:scale(1);
    }

    .cover{
      width:150px;
      height:220px;
      overflow:hidden;
      border-radius:4px 8px 8px 4px;
      background:#ddd;
      position:relative;

      box-shadow:
        -5px 0 0 var(--accent),
        0 10px 25px var(--shadow);
    }

    .book.active .cover{
      width:190px;
      height:280px;
    }

    .cover canvas{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
    }

    .cover::after{
      content:'';
      position:absolute;
      top:5px;
      bottom:5px;
      right:-3px;
      width:5px;

      background:
        repeating-linear-gradient(
          to bottom,
          #fff 0px,
          #fff 2px,
          #ececec 2px,
          #ececec 4px
        );
    }

    .bar{
      width:100%;
      height:4px;
      background:var(--blue-track);
      border-radius:999px;
      overflow:hidden;
      opacity:0;
      transition:opacity .3s;
    }

    .book.active .bar{
      opacity:1;
    }

    .fill{
      height:100%;
      width:0%;
      background:var(--blue);
    }

    .shimmer{
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          90deg,
          #ddd 25%,
          #eee 50%,
          #ddd 75%
        );

      background-size:200% 100%;
      animation:shimmer 1.2s linear infinite;
    }

    @keyframes shimmer{
      to{
        background-position:-200% 0;
      }
    }

    /* =========================
       READER
    ========================== */

    #reader{
      position:fixed;
      inset:0;
      display:none;
      flex-direction:column;
      background:var(--bg);
      z-index:100;
    }

    #reader.active{
      display:flex;
    }

    .reader-top{
      position:absolute;
      top:0;
      left:0;
      right:0;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:18px 24px;
      z-index:10;
    }

    .reader-top button{
      color:#777;
      font-size:.9rem;
    }

    .reader-top span{
      color:#777;
      font-size:.8rem;
    }

    .page-wrap{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    #pdf-canvas{
      max-width:100%;
      max-height:100%;
      display:block;
    }

    .nav{
      position:fixed;
      top:0;
      bottom:0;
      width:40%;
      z-index:5;
    }

    #left-nav{
      left:0;
    }

    #right-nav{
      right:0;
    }

    /* =========================
       MOBILE
    ========================== */

    @media (max-width:700px){

      .cover{
        width:120px;
        height:180px;
      }

      .book.active .cover{
        width:160px;
        height:240px;
      }

      .track{
        gap:18px;
        padding:0 60px;
      }

      #center-title{
        font-size:1rem;
      }
    }
  </style>
</head>
<body>

  <!-- LIBRARY -->

  <div id="library">

    <div id="center-title"></div>

    <div class="carousel" id="carousel">
      <div class="track" id="track"></div>
    </div>

  </div>

  <!-- READER -->

  <div id="reader">

    <div id="left-nav" class="nav"></div>
    <div id="right-nav" class="nav"></div>

    <div class="reader-top">
      <button id="back-btn">← Library</button>
      <span id="page-count"></span>
    </div>

    <div class="page-wrap">
      <canvas id="pdf-canvas"></canvas>
    </div>

  </div>

<script type="module">

async function getPdfjsLib(){
  for(let i=0;i<60;i++){
    if(window.pdfjsLib) return window.pdfjsLib;
    await new Promise(r=>setTimeout(r,50));
  }
  throw new Error('PDF.js failed to load');
}

const track = document.getElementById('track');
const title = document.getElementById('center-title');

const reader = document.getElementById('reader');
const canvas = document.getElementById('pdf-canvas');
const pageCount = document.getElementById('page-count');

const leftNav = document.getElementById('left-nav');
const rightNav = document.getElementById('right-nav');
const backBtn = document.getElementById('back-btn');

let books = [];
let focused = 0;

let currentDoc = null;
let currentPage = 1;
let currentBook = null;

async function loadLibrary(){

  let data = [];

  try{
    const res = await fetch('./pdf-list.json?t=' + Date.now());
    data = await res.json();
  }catch(err){
    alert('Could not load pdf-list.json');
    return;
  }

  books = data.map(item=>{
    if(typeof item === 'string'){
      return {
        path:item,
        title:clean(item)
      };
    }

    return {
      path:item.path,
      title:item.title || clean(item.path)
    };
  });

  const pdfjsLib = await getPdfjsLib();

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  for(let i=0;i<books.length;i++){

    const book = books[i];

    const el = document.createElement('div');
    el.className = 'book';
    el.dataset.index = i;

    el.innerHTML = `
      <div class="cover" id="cover-${i}">
        <div class="shimmer"></div>
      </div>

      <div class="bar">
        <div class="fill" id="fill-${i}"></div>
      </div>
    `;

    track.appendChild(el);

    renderThumb(pdfjsLib, i);
  }

  updateCarousel();

  /* CLICK FIX */

  track.addEventListener('click', e=>{

    const bookEl = e.target.closest('.book');

    if(!bookEl) return;

    const i = Number(bookEl.dataset.index);

    if(i === focused){
      openBook(i);
    }else{
      focused = i;
      updateCarousel();
    }
  });

  setupDrag();
}

function updateCarousel(){

  const all = [...document.querySelectorAll('.book')];

  all.forEach((b,i)=>{
    b.classList.toggle('active', i===focused);
  });

  if(books[focused]){
    title.textContent = books[focused].title;
  }

  const active = all[focused];

  if(active){

    const offset =
      active.offsetLeft
      - (window.innerWidth/2)
      + (active.clientWidth/2);

    track.style.transform = `translateX(${-offset}px)`;
  }
}

function setupDrag(){

  let startX = 0;
  let startFocus = 0;
  let dragging = false;

  const STEP = 180;

  function start(x){
    startX = x;
    startFocus = focused;
    dragging = true;
  }

  function move(x){

    if(!dragging) return;

    const dx = x - startX;

    const steps = -Math.round(dx / STEP);

    const next =
      Math.max(
        0,
        Math.min(
          books.length - 1,
          startFocus + steps
        )
      );

    if(next !== focused){
      focused = next;
      updateCarousel();
    }
  }

  function end(){
    dragging = false;
  }

  carousel.addEventListener('mousedown',e=>start(e.clientX));

  window.addEventListener('mousemove',e=>move(e.clientX));

  window.addEventListener('mouseup',end);

  carousel.addEventListener('touchstart',
    e=>start(e.touches[0].clientX),
    {passive:true}
  );

  carousel.addEventListener('touchmove',
    e=>move(e.touches[0].clientX),
    {passive:true}
  );

  carousel.addEventListener('touchend',end);
}

async function renderThumb(pdfjsLib, i){

  const book = books[i];

  try{

    const doc =
      await pdfjsLib
      .getDocument('./' + book.path)
      .promise;

    const page = await doc.getPage(1);

    const viewport =
      page.getViewport({scale:1});

    const scale = 0.35;

    const vp =
      page.getViewport({scale});

    const c = document.createElement('canvas');

    c.width = vp.width;
    c.height = vp.height;

    await page.render({
      canvasContext:c.getContext('2d'),
      viewport:vp
    }).promise;

    const cover =
      document.getElementById('cover-' + i);

    cover.innerHTML = '';

    cover.appendChild(c);

  }catch(err){
    console.error(err);
  }
}

async function openBook(i){

  const book = books[i];

  if(!book) return;

  const pdfjsLib = await getPdfjsLib();

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  currentBook = book;

  currentDoc =
    await pdfjsLib
    .getDocument('./' + book.path)
    .promise;

  currentPage =
    Number(
      localStorage.getItem('page::' + book.path)
    ) || 1;

  reader.classList.add('active');

  renderPage(currentPage);
}

async function renderPage(num){

  const page =
    await currentDoc.getPage(num);

  const base =
    page.getViewport({scale:1});

  const scale =
    Math.min(
      window.innerWidth / base.width,
      window.innerHeight / base.height
    );

  const vp =
    page.getViewport({scale});

  canvas.width = vp.width;
  canvas.height = vp.height;

  await page.render({
    canvasContext:canvas.getContext('2d'),
    viewport:vp
  }).promise;

  currentPage = num;

  localStorage.setItem(
    'page::' + currentBook.path,
    num
  );

  pageCount.textContent =
    `${num} / ${currentDoc.numPages}`;

  const idx =
    books.findIndex(
      b=>b.path===currentBook.path
    );

  const fill =
    document.getElementById('fill-' + idx);

  if(fill){

    const pct =
      ((num-1)/(currentDoc.numPages-1))*100;

    fill.style.width = pct + '%';
  }
}

leftNav.addEventListener('click',()=>{

  if(currentPage > 1){
    renderPage(currentPage - 1);
  }
});

rightNav.addEventListener('click',()=>{

  if(currentPage < currentDoc.numPages){
    renderPage(currentPage + 1);
  }
});

backBtn.addEventListener('click',()=>{

  reader.classList.remove('active');
});

window.addEventListener('keydown',e=>{

  if(reader.classList.contains('active')){

    if(e.key === 'ArrowRight'){
      rightNav.click();
    }

    if(e.key === 'ArrowLeft'){
      leftNav.click();
    }

    if(e.key === 'Escape'){
      backBtn.click();
    }

  }else{

    if(e.key === 'ArrowRight'){
      focused =
        Math.min(
          books.length - 1,
          focused + 1
        );

      updateCarousel();
    }

    if(e.key === 'ArrowLeft'){
      focused =
        Math.max(
          0,
          focused - 1
        );

      updateCarousel();
    }

    if(e.key === 'Enter'){
      openBook(focused);
    }
  }
});

function clean(path){

  return path
    .split('/')
    .pop()
    .replace('.pdf','')
    .replace(/[_-]/g,' ');
}

loadLibrary();

</script>

</body>
</html>
