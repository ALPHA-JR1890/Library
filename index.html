<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My PDF Library</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e0e0e0; display: flex; flex-wrap: wrap; gap: 20px; padding: 40px; justify-content: center; }
        .book { width: 140px; height: 200px; background: white; box-shadow: 5px 5px 15px rgba(0,0,0,0.2); 
                border-left: 10px solid #2c3e50; border-radius: 2px 5px 5px 2px; cursor: pointer;
                display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px; font-weight: bold; }
        .book:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="shelf" style="display: contents;"></div>

    <script>
        // Fetches the file list generated by your GitHub Action
        fetch('pdf-list.json')
            .then(response => response.json())
            .then(pdfs => {
                const shelf = document.getElementById('shelf');
                pdfs.forEach(path => {
                    const name = path.split('/').pop().replace('.pdf', '');
                    const book = document.createElement('div');
                    book.className = 'book';
                    book.innerText = name;
                    book.onclick = () => window.open(path, '_blank');
                    shelf.appendChild(book);
                });
            });
    </script>
</body>
</html>
