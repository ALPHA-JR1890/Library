<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Kindle</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&display=swap" rel="stylesheet">

<script
src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs"
type="module">
</script>

<style>

:root{
  --bg:#f5f0e8;
  --text:#1a1612;
  --muted:#7f7568;
  --accent:#b5401a;
  --blue:#3b82f6;
  --blue-bg:#dbeafe;
  --shadow:rgba(0,0,0,.16);
  --ease:cubic-bezier(.16,1,.3,1);
  --font:'Happy Monkey', cursive;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  user-select:none;
}

/* ================= LIBRARY ================= */

#library{
  width:100%;
  height:100%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

#library-title{
  position:absolute;
  top:28px;
  left:0;
  right:0;
  text-align:center;
  font-size:1.15rem;
  z-index:20;
  padding:0 80px;
}

.carousel{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:grab;
}

.carousel.grabbing{ cursor:grabbing; }

.track{
  display:flex;
  align-items:center;
  gap:28px;
  padding:0 100px;
  transition:transform .55s var(--ease);
}

/* ================= BOOK ================= */

.book{
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  opacity:.4;
  transform:scale(.82);
  transition:.4s;
  cursor:pointer;
}

.book.active{
  opacity:1;
  transform:scale(1);
}

.cover{
  width:140px;
  height:200px;
  border-radius:3px 8px 8px 3px;
  overflow:hidden;
  background:#ddd;
  box-shadow:-5px 0 0 var(--accent), 0 12px 28px var(--shadow);
  position:relative;
}

.book.active .cover{
  width:190px;
  height:270px;
}

.cover canvas{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ================= READER ================= */

#reader{
  position:fixed;
  inset:0;
  background:var(--bg);
  display:none;
  flex-direction:column;
  opacity:0;
  transition:.3s;
  z-index:100;
}

#reader.active{ display:flex; }
#reader.show{ opacity:1; }

/* TOP BAR */
.reader-top{
  position:absolute;
  top:0;
  left:0;
  right:0;
  padding:18px 20px;
  z-index:20;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.reader-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* BACK BUTTON */
#back-btn{
  background:none;
  border:none;
  color:var(--muted);
  font-size:.85rem;
  cursor:pointer;
  font-family:inherit;
}

/* PAGE INFO */
.page-info{
  color:var(--muted);
  font-size:.8rem;
}

/* PROGRESS BAR */
.reader-progress{
  width:100%;
  height:4px;
  background:rgba(0,0,0,.08);
  border-radius:999px;
  overflow:hidden;
}

.reader-progress-fill{
  width:0%;
  height:100%;
  background:var(--blue);
  transition:.3s;
}

/* PAGE */
.page-wrap{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

canvas{
  max-width:100%;
  max-height:100%;
}

.nav{
  position:fixed;
  top:0;
  bottom:0;
  width:40%;
}

#nav-left{ left:0; }
#nav-right{ right:0; }

</style>
</head>

<body>

<!-- LIBRARY -->
<div id="library">

  <div id="library-title">Loading...</div>

  <div class="carousel" id="carousel">
    <div class="track" id="track"></div>
  </div>

</div>

<!-- READER -->
<div id="reader">

  <div class="reader-top">

    <div class="reader-row">

      <button id="back-btn">← Library</button>

      <div class="page-info" id="page-info">1 / 1</div>

    </div>

    <div class="reader-progress">
      <div class="reader-progress-fill" id="reader-progress-fill"></div>
    </div>

  </div>

  <div id="nav-left" class="nav"></div>
  <div id="nav-right" class="nav"></div>

  <div class="page-wrap">
    <canvas id="pdf-canvas"></canvas>
  </div>

</div>

<script type="module">

async function getPdfjsLib(){
  for(let i=0;i<60;i++){
    if(window.pdfjsLib) return window.pdfjsLib;
    await new Promise(r=>setTimeout(r,50));
  }
  throw new Error("PDF.js failed");
}

const track = document.getElementById('track');
const carousel = document.getElementById('carousel');
const libraryTitle = document.getElementById('library-title');
const reader = document.getElementById('reader');
const canvas = document.getElementById('pdf-canvas');
const pageInfo = document.getElementById('page-info');
const backBtn = document.getElementById('back-btn');
const navLeft = document.getElementById('nav-left');
const navRight = document.getElementById('nav-right');
const progressFill = document.getElementById('reader-progress-fill');

let books=[];
let focused=0;
let currentDoc=null;
let currentPage=1;
let currentBook=null;

async function loadLibrary(){

  let raw=[];

  try{
    const res=await fetch('./pdf-list.json?t='+Date.now());
    raw=await res.json();
  }catch(e){
    libraryTitle.textContent="No pdf list";
    return;
  }

  books=raw.map(b=>typeof b==="string"
    ?{path:b,title:b.split('/').pop().replace('.pdf','')}
    :b
  );

  const pdfjsLib=await getPdfjsLib();
  pdfjsLib.GlobalWorkerOptions.workerSrc=
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

  books.forEach((b,i)=>{

    const el=document.createElement('div');
    el.className="book";
    el.dataset.index=i;

    el.innerHTML=`
      <div class="cover" id="cover-${i}"></div>
    `;

    track.appendChild(el);
  });

  updateCarousel();
  setupDragging();

  track.onclick=(e)=>{
    const b=e.target.closest('.book');
    if(!b) return;
    const i=+b.dataset.index;
    if(i===focused) openBook(i);
    else { focused=i; updateCarousel(); }
  };
}

function updateCarousel(){

  const all=[...document.querySelectorAll('.book')];

  all.forEach((b,i)=>b.classList.toggle('active',i===focused));

  const active=all[focused];
  if(!active) return;

  const offset =
    active.offsetLeft -
    window.innerWidth/2 +
    active.clientWidth/2;

  track.style.transform=`translateX(${-offset}px)`;
}

function setupDragging(){
  let startX=0,startF=0,drag=false;

  carousel.onmousedown=e=>{
    startX=e.clientX;
    startF=focused;
    drag=true;
  };

  window.onmousemove=e=>{
    if(!drag) return;
    const dx=e.clientX-startX;
    focused=Math.max(0,Math.min(books.length-1,startF-Math.round(dx/180)));
    updateCarousel();
  };

  window.onmouseup=()=>drag=false;
}

async function openBook(i){

  const pdfjsLib=await getPdfjsLib();

  currentBook=books[i];

  currentDoc=await pdfjsLib.getDocument('./'+currentBook.path).promise;

  currentPage=Number(localStorage.getItem('page::'+currentBook.path))||1;

  reader.classList.add('active');
  requestAnimationFrame(()=>reader.classList.add('show'));

  renderPage(currentPage);
}

async function renderPage(n){

  const page=await currentDoc.getPage(n);

  const vp=page.getViewport({scale:1});

  const scale=Math.min(
    innerWidth/vp.width,
    innerHeight/vp.height
  );

  const viewport=page.getViewport({scale});

  canvas.width=viewport.width;
  canvas.height=viewport.height;

  await page.render({
    canvasContext:canvas.getContext('2d'),
    viewport
  }).promise;

  currentPage=n;

  localStorage.setItem('page::'+currentBook.path,n);

  pageInfo.textContent=`${n} / ${currentDoc.numPages}`;

  progressFill.style.width=
  ((n-1)/(currentDoc.numPages-1))*100+'%';
}

navLeft.onclick=()=>currentPage>1&&renderPage(currentPage-1);
navRight.onclick=()=>currentPage<currentDoc.numPages&&renderPage(currentPage+1);

backBtn.onclick=()=>{
  reader.classList.remove('show');
  setTimeout(()=>reader.classList.remove('active'),300);
};

loadLibrary();

</script>

</body>
</html>
