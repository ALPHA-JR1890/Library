name: Generate PDF List
on:
  push:
    branches: ["**"]
jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate pdf-list.json
        run: |
          find . -iname "*.pdf" -not -path "*/.*" \
            | sed 's|^\./||' \
            | sort \
            | python3 -c "
          import json, sys, os

          # PDFs found in the repo
          repo_files = [line.strip() for line in sys.stdin if line.strip()]

          # Load existing pdf-list.json and keep any non-repo entries (e.g. Drive URLs)
          existing = []
          if os.path.exists('pdf-list.json'):
              try:
                  with open('pdf-list.json') as f:
                      existing = json.load(f)
              except Exception:
                  existing = []

          # Preserve entries that are dicts (have a 'path' key pointing to an external URL)
          external = [
              e for e in existing
              if isinstance(e, dict) and e.get('path', '').startswith('http')
          ]

          # Merge: repo files first, then external entries
          merged = repo_files + external
          print(json.dumps(merged, indent=2))
          " > pdf-list.json

      - name: Commit and push
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf-list.json
          git diff --cached --quiet && echo "No changes, skipping commit." || \
            (git commit -m "chore: update PDF library list" && git push)
