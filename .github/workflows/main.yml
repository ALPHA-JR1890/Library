name: Generate PDF List
on:
  push:
    branches: ["**"]
jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pypdf
        run: pip install pypdf --quiet

      - name: Generate pdf-list.json
        run: |
          python3 << 'PYEOF'
          import json, os, re
          from pypdf import PdfReader

          def title_from_filename(path):
              name = os.path.basename(path)
              name = re.sub(r'\.pdf$', '', name, flags=re.IGNORECASE)
              name = re.sub(r'[_]+', ' ', name)
              return name.strip()

          def get_cover_page(reader):
              """
              Return the 1-based page number of the first page that has an image
              (likely the actual cover). Falls back to page 1.
              """
              for i, page in enumerate(reader.pages[:10], start=1):
                  if '/XObject' in (page.get('/Resources') or {}):
                      xobjects = page['/Resources']['/XObject'].get_object()
                      for obj in xobjects.values():
                          o = obj.get_object()
                          if o.get('/Subtype') == '/Image':
                              return i
              return 1

          repo_entries = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for fname in sorted(files):
                  if fname.lower().endswith('.pdf'):
                      full = os.path.join(root, fname)
                      rel  = full[2:]
                      title = title_from_filename(rel)
                      cover = 1
                      try:
                          reader = PdfReader(full, strict=False)
                          cover  = get_cover_page(reader)
                      except Exception as e:
                          print(f"Warning: could not read {rel}: {e}")
                      repo_entries.append({
                          "path":  rel,
                          "title": title,
                          "cover": cover
                      })

          existing_external = []
          if os.path.exists('pdf-list.json'):
              try:
                  with open('pdf-list.json') as f:
                      existing = json.load(f)
                  existing_external = [
                      e for e in existing
                      if isinstance(e, dict) and e.get('path', '').startswith('http')
                  ]
              except Exception:
                  pass

          merged = repo_entries + existing_external
          with open('pdf-list.json', 'w') as f:
              json.dump(merged, f, indent=2)
          print(f"Written {len(merged)} entries ({len(repo_entries)} repo, {len(existing_external)} external).")
          PYEOF

      - name: Commit and push
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf-list.json
          git diff --cached --quiet && echo "No changes, skipping commit." || \
            (git commit -m "chore: update PDF library list" && git push)
