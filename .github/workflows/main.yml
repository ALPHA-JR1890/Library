name: Generate PDF List
on: [push]
jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create JSON List
        run: |
          # This finds EVERY pdf in your repo, no matter where it is hidden
          echo "[" > pdf-list.json
          find . -iname "*.pdf" -not -path "*/.*" | sed 's|^\./||' | sed 's/^/"/;s/$/",/' >> pdf-list.json
          sed -i '$ s/,$//' pdf-list.json
          echo "]" >> pdf-list.json
      - name: Save to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf-list.json
          git commit -m "Update PDF library" || echo "No changes"
          git push
